<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALAXIA DE RECUERDOS✨</title>
    <style>
        body { margin: 0; background-color: #010005; overflow: hidden; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        
        /* Cartel optimizado para Celular */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; }
        #popup { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 20px; border-radius: 20px; text-align: center; 
            z-index: 1000; width: 80%; box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
            border: 2px solid #a855f7;
            animation: popIn 0.3s ease-out;
        }
        #popup h2 { margin-top: 0; color: #7e22ce; font-size: 1.3rem; }
        #popup p { color: #333; font-size: 1rem; line-height: 1.4; }
        #closeBtn { 
            background: #7e22ce; color: white; border: none; padding: 12px 25px; 
            border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }
        @keyframes popIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>

    <div id="overlay"></div>
    <div id="popup">
        <h2 id="pTitle">Recuerdo</h2>
        <p id="pText"></p>
        <button id="closeBtn">Volver a la Galaxia</button>
    </div>

    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, staticStars = [], planetObjects = [];
        let angleX = 0, angleY = 0, targetAngleX = 0, targetAngleY = 0;
        let isDragging = false, isPaused = false, lastX, lastY;

        const photoData = [
            { src: 'https://i.postimg.cc/QttzBMMn/retouch-2026032222143797.png', tag: 'A tu lado', msg: 'Cada segundo contigo es un regalo del universo.' },
            { src: 'https://i.postimg.cc/4dd0K33j/retouch-2026032222151948.png', tag: 'Esa sonrisa', msg: 'Tu felicidad es mi parte favorita de cada día.' },
            { src: 'https://i.postimg.cc/JnnFyhh2/retouch-2026032222155495.png', tag: 'Momentos', msg: 'Guardar recuerdos contigo es mi pasatiempo favorito.' },
            { src: 'https://i.postimg.cc/633P7QQP/retouch-2026032222162350.png', tag: 'Mágico', msg: 'Lo que tenemos es único y brilla más que las estrellas.' },
            { src: 'https://i.postimg.cc/KzzWKYYJ/retouch-2026032222165608.png', tag: 'Cómplices', msg: 'Gracias por ser mi mejor compañía.' },
            { src: 'https://i.postimg.cc/8Cw3PvTm/retouch-2026032222222095.png', tag: 'Mi mundo', msg: 'Eres el centro de mi propia galaxia personal.' },
            { src: 'https://i.postimg.cc/26G2xN12/retouch-2026032222415072.png', tag: 'Tú y yo', msg: 'Donde sea, pero siempre juntos.' },
            { src: 'https://i.postimg.cc/Qtm0qZFq/retouch-2026032222425111.png', tag: 'Destino', msg: 'El universo conspiró para encontrarnos.' },
            { src: 'https://i.postimg.cc/j5cZhYDX/retouch-2026032222542337.png', tag: 'Te quiero', msg: 'Un mensaje corto para un sentimiento infinito.' },
            { src: 'https://i.postimg.cc/769mNr5X/retouch-2026032222550386.png', tag: 'Brillante', msg: 'Incluso en la oscuridad, tu luz me guía.' },
            { src: 'https://i.postimg.cc/nz201fXv/retouch-2026032222555518.png', tag: 'Para siempre', msg: 'Nuestra historia apenas está comenzando.' }
        ];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            staticStars = [];
            for (let i = 0; i < 300; i++) {
                staticStars.push({
                    x: (Math.random() - 0.5) * 2000,
                    y: (Math.random() - 0.5) * 2000,
                    z: (Math.random() - 0.5) * 2000,
                    sz: Math.random() * 2
                });
            }

            planetObjects = [];
            photoData.forEach((data, i) => {
                const img = new Image();
                img.src = data.src;
                planetObjects.push({
                    dist: 280 + (i * 30), // Órbitas más cerradas (más cerca de la cara)
                    angle: (i * (Math.PI * 2 / photoData.length)),
                    speed: 0.007,
                    yOff: (Math.random() - 0.5) * 250,
                    img: img, tag: data.tag, msg: data.msg, 
                    size: 140, // Fotos más grandes
                    lastPos: null
                });
            });
        }

        function project(x, y, z) {
            let cosX = Math.cos(angleX), sinX = Math.sin(angleX);
            let cosY = Math.cos(angleY), sinY = Math.sin(angleY);

            let ty = y * cosX - z * sinX;
            let tz = y * sinX + z * cosX;
            let tx = x * cosY - tz * sinY;
            tz = x * sinY + tz * cosY;

            const focalLength = 350; // Menor focal = Mayor sensación de cercanía
            const scale = focalLength / (focalLength + tz);
            
            return {
                x: tx * scale + width / 2,
                y: ty * scale + height / 2,
                scale: scale,
                z: tz,
                visible: tz > -300 
            };
        }

        function draw() {
            if(isPaused) return;
            ctx.fillStyle = '#010005';
            ctx.fillRect(0, 0, width, height);

            angleX += (targetAngleX - angleX) * 0.08;
            angleY += (targetAngleY - angleY) * 0.08;

            // Estrellas
            ctx.fillStyle = "white";
            staticStars.forEach(s => {
                let p = project(s.x, s.y, s.z);
                if (p.visible && p.scale > 0) {
                    ctx.beginPath(); ctx.arc(p.x, p.y, s.sz * p.scale, 0, Math.PI*2); ctx.fill();
                }
            });

            // Órbitas y Planetas
            planetObjects.forEach(p => {
                p.angle -= p.speed;
                
                // Dibujar Órbita
                ctx.beginPath();
                ctx.strokeStyle = "rgba(168, 85, 247, 0.15)"; // Órbitas color violeta tenue
                for(let i=0; i <= Math.PI*2; i+=0.3) {
                    let ox = Math.cos(i) * p.dist;
                    let oz = Math.sin(i) * p.dist;
                    let pt = project(ox, p.yOff, oz);
                    if (pt.visible) {
                        if(i===0) ctx.moveTo(pt.x, pt.y); else ctx.lineTo(pt.x, pt.y);
                    }
                }
                ctx.stroke();
            });

            const rendered = planetObjects
                .map(p => {
                    let x = Math.cos(p.angle) * p.dist;
                    let z = Math.sin(p.angle) * p.dist;
                    return { data: p, pos: project(x, p.yOff, z) };
                })
                .filter(r => r.pos.visible && r.pos.scale > 0)
                .sort((a, b) => b.pos.z - a.pos.z);

            rendered.forEach(r => {
                const p = r
