<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diorama Galáctico ✨</title>
    <style>
        body { margin: 0; background-color: #010005; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; background-color: #010005; }
        
        /* Cartel interactivo */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }
        #popup { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 20px; text-align: center; 
            z-index: 1000; width: 80%; box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
            border: 2px solid #a855f7;
        }
        #pTitle { color: #7e22ce; margin-top: 0; }
        #closeBtn { background: #7e22ce; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="overlay"></div>
    <div id="popup">
        <h2 id="pTitle">Recuerdo</h2>
        <p id="pText" style="color:#333"></p>
        <button id="closeBtn">Cerrar</button>
    </div>

    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, staticStars = [], planetObjects = [];
        let angleX = 0.3, angleY = 0; // Inclinación leve para ver las órbitas como en tu foto
        let isDragging = false, isPaused = false, lastX, lastY;

        const photoData = [
            { src: 'https://i.postimg.cc/QttzBMMn/retouch-2026032222143797.png', tag: 'A tu lado', msg: 'Cada segundo contigo es un regalo.' },
            { src: 'https://i.postimg.cc/4dd0K33j/retouch-2026032222151948.png', tag: 'Esa sonrisa', msg: 'Tu felicidad es mi parte favorita.' },
            { src: 'https://i.postimg.cc/JnnFyhh2/retouch-2026032222155495.png', tag: 'Momentos', msg: 'Guardar recuerdos es lo mejor.' },
            { src: 'https://i.postimg.cc/633P7QQP/retouch-2026032222162350.png', tag: 'Mágico', msg: 'Lo que tenemos es único.' },
            { src: 'https://i.postimg.cc/KzzWKYYJ/retouch-2026032222165608.png', tag: 'Cómplices', msg: 'Gracias por tu compañía.' },
            { src: 'https://i.postimg.cc/8Cw3PvTm/retouch-2026032222222095.png', tag: 'Mi mundo', msg: 'Eres el centro de mi galaxia.' },
            { src: 'https://i.postimg.cc/26G2xN12/retouch-2026032222415072.png', tag: 'Tú y yo', msg: 'Donde sea, pero siempre juntos.' },
            { src: 'https://i.postimg.cc/Qtm0qZFq/retouch-2026032222425111.png', tag: 'Destino', msg: 'El universo nos unió.' },
            { src: 'https://i.postimg.cc/j5cZhYDX/retouch-2026032222542337.png', tag: 'Te quiero', msg: 'Sentimiento infinito.' },
            { src: 'https://i.postimg.cc/769mNr5X/retouch-2026032222550386.png', tag: 'Brillante', msg: 'Tu luz me guía siempre.' },
            { src: 'https://i.postimg.cc/nz201fXv/retouch-2026032222555518.png', tag: 'Para siempre', msg: 'Nuestra historia continúa.' }
        ];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            staticStars = [];
            for (let i = 0; i < 200; i++) {
                staticStars.push({ x: (Math.random()-0.5)*1500, y: (Math.random()-0.5)*1500, z: (Math.random()-0.5)*1500, sz: Math.random()*2 });
            }
            planetObjects = [];
            photoData.forEach((data, i) => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = data.src;
                const orbit = i % 2; // Solo dos órbitas
                planetObjects.push({
                    dist: 250 + orbit * 120, // Distancia reducida para que se vean CERCA
                    angle: (i * (Math.PI * 2 / 6)), // Distribución
                    speed: 0.005 + Math.random() * 0.003,
                    img: img, tag: data.tag, msg: data.msg, size: 140
                });
            });
        }

        function project(x, y, z) {
            let cX = Math.cos(angleX), sX = Math.sin(angleX);
            let cY = Math.cos(angleY), sY = Math.sin(angleY);
            let ty = y * cX - z * sX;
            let tz = y * sX + z * cX;
            let tx = x * cY - tz * sY;
            tz = x * sY + tz * cY;
            const focal = 300; // FOV muy cerrado para efecto zoom
            const scale = focal / (focal + tz + 400); 
            return { x: tx * scale + width / 2, y: ty * scale + height / 2, scale, z: tz };
        }

        function draw() {
            if(isPaused) return;
            ctx.fillStyle = '#010005';
            ctx.fillRect(0, 0, width, height);

            // Estrellas
            ctx.fillStyle = "white";
            staticStars.forEach(s => {
                let p = project(s.x, s.y, s.z);
                ctx.beginPath(); ctx.arc(p.x, p.y, s.sz * p.scale * 2, 0, Math.PI*2); ctx.fill();
            });

            // Órbitas (Solo 2 caminos)
            [250, 370].forEach(d => {
                ctx.beginPath(); ctx.strokeStyle = "rgba(168, 85, 247, 0.15)";
                for(let a=0; a<Math.PI*2; a+=0.1){
                    let p = project(Math.cos(a)*d, 0, Math.sin(a)*d);
                    if(a===0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
            });

            // Sol central (Sin parpadeo)
            const sun = project(0, 0, 0);
            const grad = ctx.createRadialGradient(sun.x, sun.y, 0, sun.x, sun.y, 100 * sun.scale);
            grad.addColorStop(0, 'white'); grad.addColorStop(0.3, '#ffcc00'); grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(sun.x, sun.y, 180 * sun.scale, 0, Math.PI*2); ctx.fill();

            // Planetas con Z-Sorting
            const rendered = planetObjects.map(p => {
                p.angle -= p.speed;
                let pos = project(Math.cos(p.angle)*p.dist, 0, Math.sin(p.angle)*p.dist);
                p.lastPos = pos;
                return { data: p, pos };
            }).sort((a,b) => b.pos.z - a.pos.z);

            rendered.forEach(r => {
                const p = r.data;
                const s = p.size * r.pos.scale;
                ctx.save();
                ctx.translate(r.pos.x, r.pos.y);
                if (p.img.complete && p.img.naturalWidth !== 0) {
                    ctx.shadowBlur = 10; ctx.shadowColor = "#a855f7";
                    ctx.drawImage(p.img, -s/2, -s/2, s, s);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = "#a855f7";
                    ctx.font = `bold ${20 * r.pos.scale}px sans-serif`;
                    ctx.textAlign = "center";
                    ctx.strokeStyle = "white"; ctx.lineWidth = 1;
                    ctx.strokeText(p.tag, 0, (s/2) + 20 * r.pos.scale);
                    ctx.fillText(p.tag, 0, (s/2) + 20 * r.pos.scale);
                }
                ctx.restore();
            });

            requestAnimationFrame(draw);
        }

        // Interacciones
        const start = (x, y) => { isDragging = true; lastX = x; lastY = y; };
        const move = (x, y) => { if(!isDragging || isPaused) return; angleY += (x - lastX) * 0.005; lastX = x; };
        const end = (x, y) => {
            isDragging = false;
            planetObjects.forEach(p => {
                if(p.lastPos && Math.hypot(x - p.lastPos.x, y - p.lastPos.y) < 50) {
                    isPaused = true;
                    document.getElementById('pTitle').innerText = p.tag;
                    document.getElementById('pText').innerText = p.msg;
                    document.getElementById('overlay').style.display = 'block';
                    document.getElementById('popup').style.display = 'block';
                }
            });
        };

        window.addEventListener('mousedown', e => start(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
        window.addEventListener('mouseup', e => end(e.clientX, e.clientY));
        window.addEventListener('touchstart', e => start(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchmove', e => move(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchend', e => end(lastX, lastY));

        document.getElementById('closeBtn').onclick = () => { isPaused = false; document.getElementById('overlay').style.display = 'none'; document.getElementById('popup').style.display = 'none'; draw(); };

        init(); draw();
        window.onresize = init;
    </script>
</body>
</html>
