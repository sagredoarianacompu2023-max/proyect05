<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nuestra Galaxia ✨</title>
    <style>
        body { margin: 0; background-color: #010005; overflow: hidden; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; background: #010005; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }
        #popup { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 20px; border-radius: 20px; text-align: center; 
            z-index: 1000; width: 80%; box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
            border: 2px solid #a855f7;
        }
        #pTitle { color: #7e22ce; margin-top: 0; font-size: 1.3rem; }
        #pText { color: #333; line-height: 1.4; font-size: 1rem; }
        #closeBtn { background: #7e22ce; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="overlay"></div>
    <div id="popup">
        <h2 id="pTitle">Recuerdo Especial</h2>
        <p id="pText">Cargando mensaje...</p>
        <button id="closeBtn">Volver a la Galaxia</button>
    </div>

    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, staticStars = [], planetObjects = [];
        let angleX = 0, angleY = 0, targetAngleX = 0, targetAngleY = 0;
        let isDragging = false, isPaused = false, lastX, lastY;

        const photoData = [
            { src: 'https://i.postimg.cc/QttzBMMn/retouch-2026032222143797.png', tag: 'A tu lado', msg: 'Cada segundo contigo es un regalo.' },
            { src: 'https://i.postimg.cc/4dd0K33j/retouch-2026032222151948.png', tag: 'Esa sonrisa', msg: 'Tu felicidad es mi parte favorita.' },
            { src: 'https://i.postimg.cc/JnnFyhh2/retouch-2026032222155495.png', tag: 'Momentos', msg: 'Guardar recuerdos es lo mejor.' },
            { src: 'https://i.postimg.cc/633P7QQP/retouch-2026032222162350.png', tag: 'Mágico', msg: 'Lo que tenemos es único.' },
            { src: 'https://i.postimg.cc/KzzWKYYJ/retouch-2026032222165608.png', tag: 'Cómplices', msg: 'Gracias por tu compañía.' },
            { src: 'https://i.postimg.cc/8Cw3PvTm/retouch-2026032222222095.png', tag: 'Mi mundo', msg: 'Eres el centro de mi galaxia.' },
            { src: 'https://i.postimg.cc/26G2xN12/retouch-2026032222415072.png', tag: 'Tú y yo', msg: 'Donde sea, pero siempre juntos.' },
            { src: 'https://i.postimg.cc/Qtm0qZFq/retouch-2026032222425111.png', tag: 'Destino', msg: 'El universo conspiró para encontrarnos.' },
            { src: 'https://i.postimg.cc/j5cZhYDX/retouch-2026032222542337.png', tag: 'Te quiero', msg: 'Sentimiento infinito.' },
            { src: 'https://i.postimg.cc/769mNr5X/retouch-2026032222550386.png', tag: 'Brillante', msg: 'Tu luz me guía siempre.' },
            { src: 'https://i.postimg.cc/nz201fXv/retouch-2026032222555518.png', tag: 'Para siempre', msg: 'Nuestra historia continúa.' }
        ];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            staticStars = [];
            for (let i = 0; i < 300; i++) {
                staticStars.push({ x: (Math.random()-0.5)*2000, y: (Math.random()-0.5)*2000, z: (Math.random()-0.5)*2000, sz: Math.random()*2 });
            }

            planetObjects = [];
            photoData.forEach((data, i) => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = data.src;
                
                planetObjects.push({
                    dist: 350 + (i * 40), // Órbitas más grandes para el zoom
                    angle: (i * (Math.PI * 2 / photoData.length)),
                    speed: 0.007 / (1 + i * 0.1),
                    yOff: (Math.random() - 0.5) * 200,
                    img: img, tag: data.tag, msg: data.msg, size: 130, lastPos: null
                });
            });
        }

        // Motor 3D con Focal más corto para SUPER ZOOM
        function rotate3D(x, y, z) {
            let cY = Math.cos(angleY), sY = Math.sin(angleY);
            let x1 = x * cY - z * sY, z1 = x * sY + z * cY;
            let cX = Math.cos(angleX), sinX = Math.sin(angleX);
            let y1 = y * cX - z1 * sX, z2 = y * sX + z1 * cX;
            const focal = 250; // BAJADO de 600 a 250 para acercar la cámara
            const s = focal / (focal + z2);
            return { x: x1 * s + width / 2, y: y1 * s + height / 2, s: s, z: z2 };
        }

        // Función corregida: Texto Violeta Neón Grande
        function drawPurePhoto(p, pos) {
            const s = p.size * pos.s;
            ctx.save();
            ctx.translate(pos.x, pos.y);
            
            // Aura de luz
            ctx.shadowBlur = 15 * pos.s; ctx.shadowColor = "rgba(168, 85, 247, 0.4)";
            
            // Imagen PNG recortada
            if (p.img.complete && p.img.naturalWidth !== 0) ctx.drawImage(p.img, -s/2, -s/2, s, s);
            
            // Texto inferior GRANDE y VIOLETA NEÓN
            ctx.shadowBlur = 0; 
            ctx.fillStyle = "#a855f7"; // Violeta Neón
            ctx.font = `bold ${18 * pos.s}px sans-serif`; // Letra más grande
            ctx.textAlign = "center";
            ctx.textBaseline = "top";
            
            // Borde blanco sutil para resaltar
            ctx.strokeStyle = "white";
            ctx.lineWidth = 1 * pos.s;
            ctx.strokeText(p.tag, 0, (s/2) + 12 * pos.s);
            ctx.fillText(p.tag, 0, (s/2) + 12 * pos.s);
            
            ctx.restore();
        }

        function drawOrbit(dist, zOff) {
            ctx.beginPath(); ctx.strokeStyle = "rgba(168, 85, 247, 0.1)";
            ctx.lineWidth = 1;
            for(let a=0; a<Math.PI*2; a+=0.1) {
                const p = rotate3D(Math.cos(a)*dist, zOff, Math.sin(a)*dist);
                if(p.z > -200) { // No dibujar órbita si está muy cerca de la "cámara"
                    if(a===0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
                }
            }
            ctx.stroke();
        }

        function draw() {
            if(isPaused) return;
            // ELIMINADO ctx.clearRect para evitar el parpadeo
            ctx.fillStyle = '#010005'; ctx.fillRect(0, 0, width, height); // Dibujar fondo firme

            // Estrellas
            ctx.fillStyle = "white";
            staticStars.forEach(s => {
                let p = rotate3D(s.x, s.y, s.z);
                if (p.z > -200) {
                    ctx.beginPath(); ctx.arc(p.x, p.y, s.sz * p.s, 0, Math.PI*2); ctx.fill();
                }
            });

            angleX += (targetAngleX - angleX) * 0.1;
            angleY += (targetAngleY - angleY) * 0.1;

            planetObjects.forEach(p => drawOrbit(p.dist, p.zOff));

            // SOL CENTRAL GIGANTE ESTABLE
            const n = rotate3D(0, 0, 0);
            const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, 115 * n.s);
            g.addColorStop(0, '#fff'); g.addColorStop(0.2, '#ffeb3b'); g.addColorStop(1, 'transparent');
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(n.x, n.y, 160 * n.s, 0, Math.PI*2); ctx.fill();

            // Z-Sorting y Proyección de Planetas
            const rendered = planetObjects.map(p => {
                p.angle += p.speed;
                const pos = rotate3D(Math.cos(p.angle)*p.dist, p.zOff, Math.sin(p.angle)*p.dist);
                p.lastPos = pos;
                return { data: p, pos: pos };
            });

            rendered.sort((a,b) => b.pos.z - a.pos.z);

            rendered.forEach(r => {
                if(r.pos.z > -200) drawPurePhoto(r.data, r.pos);
            });

            requestAnimationFrame(draw);
        }

        // Interacciones
        function checkClick(ex, ey) {
            for(let p of planetObjects) {
                if(!p.lastPos) continue;
                const d = Math.hypot(ex - p.lastPos.x, ey - p.lastPos.y);
                if(d < 50 * p.lastPos.s) {
                    isPaused = true;
                    document.getElementById('pTitle').innerText = p.tag;
                    document.getElementById('pText').innerText = p.msg;
                    document.getElementById('overlay').style.display = 'block';
                    document.getElementById('popup').style.display = 'block';
                    break;
                }
            }
        }

        const start = (x, y) => { isDragging = true; lastX = x; lastY = y; };
        const move = (x, y) => { if(!isDragging || isPaused) return; targetAngleY += (x - lastX) * 0.007; targetAngleX -= (y - lastY) * 0.007; lastX = x; lastY = y; };

        window.addEventListener('mousedown', e => start(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
        window.addEventListener('mouseup', e => { isDragging = false; checkClick(e.clientX, e.clientY); });
        window.addEventListener('touchstart', e => start(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchmove', e => move(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchend', e => { isDragging = false; checkClick(lastX, lastY); });

        document.getElementById('closeBtn').onclick = () => {
            isPaused = false; document.getElementById('overlay').style.display = 'none';
            document.getElementById('popup').style.display = 'none'; draw();
        };

        init(); draw();
        window.onresize = init;
    </script>
</body>
</html>
