<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>planetas de Recuerdos ✨</title>
    <style>
        body { margin: 0; background-color: #010005; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        
        /* Cartel interactivo optimizado */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; }
        #popup { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 20px; text-align: center; 
            z-index: 1000; width: 80%; box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
            border: 2px solid #a855f7;
            animation: popIn 0.3s ease-out;
        }
        #pTitle { color: #7e22ce; margin-top: 0; font-size: 1.4rem; }
        #pText { color: #333; line-height: 1.5; font-size: 1.1rem; }
        #closeBtn { background: #7e22ce; color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        @keyframes popIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>

    <div id="overlay"></div>
    <div id="popup">
        <h2 id="pTitle">Recuerdo Especial</h2>
        <p id="pText">Cargando mensaje...</p>
        <button id="closeBtn">Seguir Observando</button>
    </div>

    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, staticStars = [], planetObjects = [];
        let angleX = Math.PI / 15, angleY = 0, targetAngleX = Math.PI / 15, targetAngleY = 0; // Inclinación fija
        let isDragging = false, isPaused = false, lastX, lastY;

        const photoData = [
            { src: 'https://i.postimg.cc/QttzBMMn/retouch-2026032222143797.png', tag: 'A tu lado', msg: 'Cada segundo contigo es un regalo del universo.' },
            { src: 'https://i.postimg.cc/4dd0K33j/retouch-2026032222151948.png', tag: 'Esa sonrisa', msg: 'Tu felicidad es mi parte favorita de cada día.' },
            { src: 'https://i.postimg.cc/JnnFyhh2/retouch-2026032222155495.png', tag: 'Momentos', msg: 'Guardar recuerdos contigo es mi pasatiempo favorito.' },
            { src: 'https://i.postimg.cc/633P7QQP/retouch-2026032222162350.png', tag: 'Mágico', msg: 'Lo que tenemos es único y brilla más que las estrellas.' },
            { src: 'https://i.postimg.cc/KzzWKYYJ/retouch-2026032222165608.png', tag: 'Cómplices', msg: 'Gracias por ser mi mejor compañía en este viaje.' },
            { src: 'https://i.postimg.cc/8Cw3PvTm/retouch-2026032222222095.png', tag: 'Mi mundo', msg: 'Eres el centro de mi propia galaxia personal.' },
            { src: 'https://i.postimg.cc/26G2xN12/retouch-2026032222415072.png', tag: 'Tú y yo', msg: 'Donde sea, pero siempre juntos.' },
            { src: 'https://i.postimg.cc/Qtm0qZFq/retouch-2026032222425111.png', tag: 'Destino', msg: 'El universo conspiró para encontrarnos.' },
            { src: 'https://i.postimg.cc/j5cZhYDX/retouch-2026032222542337.png', tag: 'Te quiero', msg: 'Un mensaje corto para un sentimiento infinito.' },
            { src: 'https://i.postimg.cc/769mNr5X/retouch-2026032222550386.png', tag: 'Brillante', msg: 'Incluso en la oscuridad, tu luz me guía.' },
            { src: 'https://i.postimg.cc/nz201fXv/retouch-2026032222555518.png', tag: 'Para siempre', msg: 'Nuestra historia apenas está comenzando.' }
        ];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            staticStars = [];
            for (let i = 0; i < 400; i++) {
                staticStars.push({ x: Math.random()*width, y: Math.random()*height, sz: Math.random()*1.5, op: Math.random() });
            }
            planetObjects = [];
            photoData.forEach((data, i) => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = data.src;
                // Definir a qué órbita pertenece (0 o 1)
                const orbitIndex = Math.floor(Math.random() * 2);
                planetObjects.push({
                    dist: 350 + orbitIndex * 150, // Dos radios de órbita distintos
                    angle: (i * (Math.PI * 2 / photoData.length)),
                    speed: 0.006 - orbitIndex * 0.0015,
                    yOff: 0, // Planos perfectamente horizontales
                    img: img, tag: data.tag, msg: data.msg, size: 120, lastPos: null
                });
            });
        }

        // Motor 3D Proyectado para "Vista Diorama"
        function project3D(x, y, z) {
            let cosX = Math.cos(angleX), sinX = Math.sin(angleX);
            let cosY = Math.cos(angleY), sinY = Math.sin(angleY);
            let ty = y * cosX - z * sinX;
            let tz = y * sinX + z * cosX;
            let tx = x * cosY - tz * sinY;
            tz = x * sinY + tz * cosY;
            const focal = 1000; // Focal larga para vista "exterior"
            const scale = focal / (focal + tz + 1000); // Añadimos profundidad extra
            return { x: tx * scale + width / 2, y: ty * scale + height / 2, scale, z: tz };
        }

        // Función para dibujar una órbita 3D
        function drawOrbit(dist) {
            ctx.beginPath();
            ctx.strokeStyle = "rgba(168, 85, 247, 0.12)";
            ctx.lineWidth = 1;
            for (let a = 0; a <= Math.PI * 2; a += 0.1) {
                let ox = Math.cos(a) * dist;
                let oz = Math.sin(a) * dist;
                let pt = project3D(ox, 0, oz);
                if (a === 0) ctx.moveTo(pt.x, pt.y); else ctx.lineTo(pt.x, pt.y);
            }
            ctx.stroke();
        }

        function draw() {
            if(isPaused) return;
            ctx.fillStyle = '#010005';
            ctx.fillRect(0, 0, width, height);

            staticStars.forEach(s => {
                ctx.fillStyle = `rgba(255,255,255,${s.op})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.sz, 0, Math.PI*2); ctx.fill();
            });

            angleX += (targetAngleX - angleX) * 0.08;
            angleY += (targetAngleY - angleY) * 0.08;

            // Dibujar las dos órbitas de guía
            drawOrbit(350);
            drawOrbit(500);

            // Preparar Planetas
            const rendered = planetObjects.map(p => {
                p.angle -= p.speed;
                let x = Math.cos(p.angle
