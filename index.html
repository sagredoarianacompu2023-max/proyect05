<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia Infinita ✨</title>
    <style>
        body {
            margin: 0;
            background-color: #050208;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            /* Suaviza los bordes para un look más gaseoso */
            filter: blur(2px) contrast(1.2);
        }

        /* Pequeño brillo central decorativo */
        .glow {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            box-shadow: 0 0 100px 50px rgba(168, 85, 247, 0.2);
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="glow"></div>
    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        let width, height;
        let particles = [];
        const numParticles = 280; // La cantidad exacta que pediste
        
        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
                // Iniciar en una esfera pequeña en el centro
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 80;
                this.x = width / 2 + Math.cos(angle) * radius;
                this.y = height / 2 + Math.sin(angle) * radius;
            }

            reset() {
                this.size = Math.random() * 3 + 1;
                this.color = this.getRandomColor();
                // Destino final en la galaxia (espiral)
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * (Math.min(width, height) * 0.45);
                this.destX = width / 2 + Math.cos(angle) * dist;
                this.destY = height / 2 + Math.sin(angle) * dist;
                
                this.vx = 0;
                this.vy = 0;
                this.acc = 0.02 + Math.random() * 0.03;
                this.friction = 0.95;
            }

            getRandomColor() {
                const colors = ['#ff00ff', '#7000ff', '#00d4ff', '#ffffff', '#f0abff'];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }

            update() {
                // Movimiento de expansión hacia la forma de galaxia
                let dx = this.destX - this.x;
                let dy = this.destY - this.y;
                
                this.vx += dx * this.acc;
                this.vy += dy * this.acc;
                
                // Rotación leve para el efecto de espiral galáctica
                const rotateSpeed = 0.002;
                const rx = this.x - width / 2;
                const ry = this.y - height / 2;
                this.vx -= ry * rotateSpeed;
                this.vy += rx * rotateSpeed;

                this.vx *= this.friction;
                this.vy *= this.friction;
                
                this.x += this.vx;
                this.y += this.vy;
            }
        }

        function setup() {
            initCanvas();
            particles = [];
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            // Fondo con rastro para efecto estelar
            ctx.fillStyle = 'rgba(5, 2, 8, 0.15)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            initCanvas();
            particles.forEach(p => p.reset());
        });

        // Iniciar
        setup();
        animate();
    </script>
</body>
</html>
