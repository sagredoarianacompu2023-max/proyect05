<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia 3D Interactiva ✨</title>
    <style>
        body { margin: 0; background-color: #020105; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; cursor: grab; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }
        #popup { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 20px; text-align: center; 
            z-index: 1000; max-width: 80%; box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
        }
        #closeBtn { background: #7e22ce; color: white; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay"></div>
    <div id="popup">
        <h2 id="pTitle" style="color:#7e22ce">Recuerdo</h2>
        <p id="pText" style="color:#444"></p>
        <button id="closeBtn">Cerrar</button>
    </div>

    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, staticStars = [], planetObjects = [];
        let angleX = 0, angleY = 0, targetAngleX = 0, targetAngleY = 0;
        let isDragging = false, isPaused = false, lastX, lastY;

        const photoData = [
            { src: 'https://i.postimg.cc/QttzBMMn/retouch-2026032222143797.png', tag: 'A tu lado', msg: 'Cada segundo contigo es un regalo.' },
            { src: 'https://i.postimg.cc/4dd0K33j/retouch-2026032222151948.png', tag: 'Esa sonrisa', msg: 'Tu felicidad es mi parte favorita.' },
            { src: 'https://i.postimg.cc/JnnFyhh2/retouch-2026032222155495.png', tag: 'Momentos', msg: 'Guardar recuerdos contigo es lo mejor.' },
            { src: 'https://i.postimg.cc/633P7QQP/retouch-2026032222162350.png', tag: 'Mágico', msg: 'Lo que tenemos es único.' },
            { src: 'https://i.postimg.cc/KzzWKYYJ/retouch-2026032222165608.png', tag: 'Cómplices', msg: 'Gracias por tu compañía.' },
            { src: 'https://i.postimg.cc/8Cw3PvTm/retouch-2026032222222095.png', tag: 'Mi mundo', msg: 'Eres el centro de mi galaxia.' },
            { src: 'https://i.postimg.cc/26G2xN12/retouch-2026032222415072.png', tag: 'Tú y yo', msg: 'Donde sea, pero siempre juntos.' },
            { src: 'https://i.postimg.cc/Qtm0qZFq/retouch-2026032222425111.png', tag: 'Destino', msg: 'El universo nos unió.' },
            { src: 'https://i.postimg.cc/j5cZhYDX/retouch-2026032222542337.png', tag: 'Te quiero', msg: 'Sentimiento infinito.' },
            { src: 'https://i.postimg.cc/769mNr5X/retouch-2026032222550386.png', tag: 'Brillante', msg: 'Tu luz me guía siempre.' },
            { src: 'https://i.postimg.cc/nz201fXv/retouch-2026032222555518.png', tag: 'Para siempre', msg: 'Nuestra historia continúa.' }
        ];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            staticStars = [];
            for (let i = 0; i < 300; i++) {
                staticStars.push({ x: Math.random()*width, y: Math.random()*height, sz: Math.random()*1.5, op: Math.random() });
            }

            planetObjects = [];
            photoData.forEach((data, i) => {
                const img = new Image();
                img.crossOrigin = "anonymous"; // Ayuda con problemas de carga externa
                img.src = data.src;
                
                planetObjects.push({
                    dist: 180 + i * 50,
                    angle: (i * (Math.PI * 2 / photoData.length)),
                    speed: 0.005 / (1 + i * 0.1),
                    size: 90, 
                    zOff: (Math.random() - 0.5) * 60,
                    img: img, tag: data.tag, msg: data.msg, lastPos: null
                });
            });
        }

        function rotate3D(x, y, z) {
            let cY = Math.cos(angleY), sY = Math.sin(angleY);
            let x1 = x * cY - z * sY, z1 = x * sY + z * cY;
            let cX = Math.cos(angleX), sX = Math.sin(angleX);
            let y1 = y * cX - z1 * sX, z2 = y * sX + z1 * cX;
            const f = 600; const s = f / (f + z2);
            return { x: x1 * s + width / 2, y: y1 * s + height / 2, s: s, z: z2 };
        }

        function draw() {
            if(isPaused) return;
            ctx.fillStyle = '#020105'; ctx.fillRect(0, 0, width, height);

            staticStars.forEach(s => {
                ctx.fillStyle = `rgba(255,255,255,${s.op})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.sz, 0, Math.PI*2); ctx.fill();
            });

            angleX += (targetAngleX - angleX) * 0.1;
            angleY += (targetAngleY - angleY) * 0.1;

            // Sol Central
            const n = rotate3D(0, 0, 0);
            const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, 110 * n.s);
            g.addColorStop(0, '#fff'); g.addColorStop(0.2, '#ffeb3b'); g.addColorStop(1, 'transparent');
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(n.x, n.y, 160 * n.s, 0, Math.PI*2); ctx.fill();

            // Órbitas y Planetas
            const rendered = planetObjects.map(p => {
                p.angle += p.speed;
                const pos = rotate3D(Math.cos(p.angle)*p.dist, p.zOff, Math.sin(p.angle)*p.dist);
                p.lastPos = pos;
                return { data: p, pos: pos };
            });

            rendered.sort((a,b) => b.pos.z - a.pos.z);

            rendered.forEach(r => {
                const p = r.data;
                const pos = r.pos;
                const s = p.size * pos.s;

                // Dibujar Órbita tenue
                ctx.beginPath(); ctx.strokeStyle = "rgba(100, 255, 255, 0.05)";
                ctx.arc(n.x, n.y, p.dist * pos.s, 0, Math.PI*2); // Simplificada para fluidez
                ctx.stroke();

                ctx.save();
                ctx.translate(pos.x, pos.y);
                if (p.img.complete && p.img.naturalWidth !== 0) {
                    ctx.shadowBlur = 10 * pos.s; ctx.shadowColor = "rgba(168, 85, 247, 0.4)";
                    ctx.drawImage(p.img, -s/2, -s/2, s, s);
                    
                    // Texto
                    ctx.shadowBlur = 0; ctx.fillStyle = "white";
                    ctx.font = `bold ${12 * pos.s}px sans-serif`;
                    ctx.textAlign = "center";
                    ctx.fillText(p.tag, 0, (s/2) + 10 * pos.s);
                }
                ctx.restore();
            });

            requestAnimationFrame(draw);
        }

        // Interacción
        function checkClick(ex, ey) {
            for(let p of planetObjects) {
                if(!p.lastPos) continue;
                const d = Math.hypot(ex - p.lastPos.x, ey - p.lastPos.y);
                if(d < 50 * p.lastPos.s) {
                    isPaused = true;
                    document.getElementById('pTitle').innerText = p.tag;
                    document.getElementById('pText').innerText = p.msg;
                    document.getElementById('overlay').style.display = 'block';
                    document.getElementById('popup').style.display = 'block';
                    break;
                }
            }
        }

        const start = (x, y) => { isDragging = true; lastX = x; lastY = y; };
        const move = (x, y) => { if(!isDragging || isPaused) return; targetAngleY += (x - lastX) * 0.007; targetAngleX -= (y - lastY) * 0.007; lastX = x; lastY = y; };

        window.addEventListener('mousedown', e => start(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
        window.addEventListener('mouseup', e => { isDragging = false; checkClick(e.clientX, e.clientY); });
        
        document.getElementById('closeBtn').onclick = () => {
            isPaused = false; document.getElementById('overlay').style.display = 'none';
            document.getElementById('popup').style.display = 'none'; draw();
        };

        init(); draw();
        window.onresize = init;
    </script>
</body>
</html>
