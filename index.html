<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soft Galaxy 🌌</title>
    <style>
        body {
            margin: 0;
            background-color: #050208;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .bar {
            position: absolute;
            bottom: 30px;
            width: 85%;
            max-width: 380px;
            display: flex;
            background: rgba(15, 5, 25, 0.7);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 60px;
            padding: 6px 6px 6px 20px;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: #f0abff;
            outline: none;
        }

        button {
            background: #7e22ce;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
        }

        canvas { display: block; filter: blur(3px); }
    </style>
</head>
<body>

    <canvas id="galaxyCanvas"></canvas>

    <div class="bar">
        <input type="text" id="inputField" placeholder="Escribe tu mensaje..." maxlength="12">
        <button id="btn">Expandir</button>
    </div>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, clouds = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            createSoftGalaxy();
        }

        class NebulaCloud {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = width / 2;
                this.y = height / 2;
                this.size = Math.random() * 80 + 40;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 0.01 + 0.003;
                this.dist = Math.random() * 120;
                // Colores galácticos suaves
                const colors = ['rgba(147, 51, 234, 0.12)', 'rgba(59, 130, 246, 0.12)', 'rgba(236, 72, 153, 0.12)'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.angle += this.speed;
                this.currentX = this.x + Math.cos(this.angle) * this.dist;
                this.currentY = this.y + Math.sin(this.angle) * this.dist;
            }

            draw() {
                const gradient = ctx.createRadialGradient(
                    this.currentX, this.currentY, 0,
                    this.currentX, this.currentY, this.size
                );
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                // 'screen' hace que los colores se sumen
