<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> mi espacio 🌌</title>
    <style>
        body { margin: 0; background-color: #020105; overflow: hidden; touch-action: none; }
        canvas { display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }
    </style>
</head>
<body>
    <canvas id="galaxyCanvas"></canvas>

    <script>
    const canvas = document.getElementById('galaxyCanvas');
  const ctx = canvas.getContext('2d');
        
let width, height;
        let staticStars = [];
        let planetObjects = [];
        let loadedImages = [];
        const numStars = 450; 

let angleX = 0, angleY = 0;
        let targetAngleX = 0, targetAngleY = 0;
        let isDragging = false;
        let lastMouseX, lastMouseY;

        // --- LISTA DE TUS 11 IMÁGENES ÚNICAS ---
    const imageSources = [
            'https://i.postimg.cc/QttzBMMn/retouch-2026032222143797.png',
            'https://i.postimg.cc/4dd0K33j/retouch-2026032222151948.png',
            'https://i.postimg.cc/JnnFyhh2/retouch-2026032222155495.png',
            'https://i.postimg.cc/633P7QQP/retouch-2026032222162350.png',
            'https://i.postimg.cc/KzzWKYYJ/retouch-2026032222165608.png',
            'https://i.postimg.cc/8Cw3PvTm/retouch-2026032222222095.png',
            'https://i.postimg.cc/26G2xN12/retouch-2026032222415072.png',
            'https://i.postimg.cc/Qtm0qZFq/retouch-2026032222425111.png',
            'https://i.postimg.cc/j5cZhYDX/retouch-2026032222542337.png',
            'https://i.postimg.cc/769mNr5X/retouch-2026032222550386.png',
            'https://i.postimg.cc/nz201fXv/retouch-2026032222555518.png'
        ];

        function loadImages(callback) {
            let loadedCount = 0;
            imageSources.forEach((src, index) => {
                const img = new Image();
                img.src = src;
                img.onload = () => {
                    loadedCount++;
                    if (loadedCount === imageSources.length) callback();
                };
                img.onerror = () => {
                    loadedCount++;
                    if (loadedCount === imageSources.length) callback();
                };
                // Guardamos la imagen en la posición exacta del array
                loadedImages[index] = img;
            });
        }

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            staticStars = [];
            for (let i = 0; i < numStars; i++) {
                staticStars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 1.3,
                    opacity: Math.random()
                });
            }

            planetObjects = [];
            // Filtramos solo las imágenes que cargaron bien
            const validImages = loadedImages.filter(img => img && img.complete && img.naturalWidth !== 0);
            
            // Creamos un planeta por cada imagen única (SIN REPETIR)
            validImages.forEach((image, i) => {
                planetObjects.push({
                    dist: 160 + i * 50, // Órbitas bien separadas
                    orbitAngle: (i * (Math.PI * 2 / validImages.length)), // Distribución inicial pareja
                    speed: 0.008 / (1 + i * 0.2), 
                    size: 80, 
                    zOffset: (Math.random() - 0.5) * 60,
                    img: image // Asignación directa de la imagen única
                });
            });
        }

        function rotate3D(x, y, z) {
            let cosY = Math.cos(angleY), sinY = Math.sin(angleY);
            let x1 = x * cosY - z * sinY;
            let z1 = x * sinY + z * cosY;
            let cosX = Math.cos(angleX), sinX = Math.sin(angleX);
            let y1 = y * cosX - z1 * sinX;
            let z2 = y * sinX + z1 * cosX;
            const focal = 600;
            const scale = focal / (focal + z2);
            return { x: x1 * scale + width / 2, y: y1 * scale + height / 2, scale: scale, z: z2 };
        }

        function drawOrbit(dist, zOffset) {
            ctx.beginPath();
            ctx.strokeStyle = "rgba(100, 255, 255, 0.1)";
            ctx.lineWidth = 1;
            for (let a = 0; a <= Math.PI * 2; a += 0.1) {
                const p = rotate3D(Math.cos(a) * dist, zOffset, Math.sin(a) * dist);
                if (a === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            }
            ctx.closePath();
            ctx.stroke();
        }

        function draw() {
            ctx.fillStyle = '#020105';
            ctx.fillRect(0, 0, width, height);

            staticStars.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
            });

            angleX += (targetAngleX - angleX) * 0.0
