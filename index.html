<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universo de Recuerdos ✨</title>
    <style>
        body { margin: 0; background-color: #010005; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; background: #010005; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }
        #popup { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 25px; border-radius: 20px; text-align: center; 
            z-index: 1000; width: 80%; border: 2px solid #a855f7;
        }
        #closeBtn { background: #7e22ce; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="overlay"></div>
    <div id="popup">
        <h2 id="pTitle" style="color:#7e22ce; margin:0">Recuerdo</h2>
        <p id="pText" style="color:#333; line-height:1.5"></p>
        <button id="closeBtn">Volver</button>
    </div>

    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [], planets = [];
        let angleY = 0, targetAngleY = 0, isDragging = false, isPaused = false, lastX;

        const photoData = [
            { src: 'https://i.postimg.cc/QttzBMMn/retouch-2026032222143797.png', tag: 'A tu lado', msg: 'Cada segundo contigo es un regalo.', col: '#ff5555' },
            { src: 'https://i.postimg.cc/4dd0K33j/retouch-2026032222151948.png', tag: 'Esa sonrisa', msg: 'Tu felicidad es mi parte favorita.', col: '#55ff55' },
            { src: 'https://i.postimg.cc/JnnFyhh2/retouch-2026032222155495.png', tag: 'Momentos', msg: 'Guardar recuerdos es lo mejor.', col: '#5555ff' },
            { src: 'https://i.postimg.cc/633P7QQP/retouch-2026032222162350.png', tag: 'Mágico', msg: 'Lo que tenemos es único.', col: '#ffff55' },
            { src: 'https://i.postimg.cc/KzzWKYYJ/retouch-2026032222165608.png', tag: 'Cómplices', msg: 'Gracias por tu compañía.', col: '#ff55ff' },
            { src: 'https://i.postimg.cc/8Cw3PvTm/retouch-2026032222222095.png', tag: 'Mi mundo', msg: 'Eres el centro de mi galaxia.', col: '#55ffff' },
            { src: 'https://i.postimg.cc/26G2xN12/retouch-2026032222415072.png', tag: 'Tú y yo', msg: 'Don de sea, pero juntos.', col: '#ffa500' },
            { src: 'https://i.postimg.cc/Qtm0qZFq/retouch-2026032222425111.png', tag: 'Destino', msg: 'El universo nos unió.', col: '#ffffff' },
            { src: 'https://i.postimg.cc/j5cZhYDX/retouch-2026032222542337.png', tag: 'Te quiero', msg: 'Sentimiento infinito.', col: '#ff0000' },
            { src: 'https://i.postimg.cc/769mNr5X/retouch-2026032222550386.png', tag: 'Brillante', msg: 'Tu luz me guía siempre.', col: '#00ff00' },
            { src: 'https://i.postimg.cc/nz201fXv/retouch-2026032222555518.png', tag: 'Para siempre', msg: 'Nuestra historia continúa.', col: '#0000ff' }
        ];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = Array.from({length: 200}, () => ({ x: Math.random()*width, y: Math.random()*height, s: Math.random()*2 }));
            
            planets = photoData.map((d, i) => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = d.src + "?t=" + new Date().getTime(); // Anti-caché
                return {
                    img, ...d,
                    angle: i * (Math.PI * 2 / photoData.length),
                    dist: 220 + (i % 2) * 130, // Solo 2 órbitas principales
                    speed: 0.005 + Math.random() * 0.002,
                    lastPos: {x:0, y:0, s:0}
                };
            });
        }

        function draw() {
            if(isPaused) return;
            ctx.fillStyle = '#010005';
            ctx.fillRect(0, 0, width, height);

            // Estrellas fijas
            ctx.fillStyle = "white";
            stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

            angleY += (targetAngleY - angleY) * 0.1;

            // Sol Central (Dibuja siempre primero)
            const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, 100);
            grad.addColorStop(0, 'white'); grad.addColorStop(0.2, '#ffcc00'); grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(width/2, height/2, 150, 0, Math.PI*2); ctx.fill();

            // Dibujar Planetas
            planets.forEach(p => {
                p.angle -= p.speed;
                // Proyección simple para que se vean grandes y orbiten el sol
                const x3d = Math.cos(p.angle + angleY) * p.dist;
                const z3d = Math.sin(p.angle + angleY) * p.dist;
                
                const scale = 400 / (400 + z3d);
                const x2d = x3d * scale + width / 2;
                const y2d = (z3d * 0.2) * scale + height / 2; // Ligera inclinación
                const size = 120 * scale;

                p.lastPos = { x: x2d, y: y2d, s: size };

                ctx.save();
                ctx.translate(x2d, y2d);

                if (p.img.complete && p.img.naturalWidth !== 0) {
                    // Si la imagen cargó, la dibuja
                    ctx.shadowBlur = 15; ctx.shadowColor = "#a855f7";
                    ctx.drawImage(p.img, -size/2, -size/2, size, size);
                } else {
                    // Si NO cargó, dibuja un círculo de color (Planeta de emergencia)
                    ctx.fillStyle = p.col;
                    ctx.shadowBlur = 20; ctx.shadowColor = p.col;
                    ctx.beginPath(); ctx.arc(0, 0, size/2, 0, Math.PI*2); ctx.fill();
                }

                // Texto Violeta Neón
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#a855f7";
                ctx.font = `bold ${18 * scale}px sans-serif`;
                ctx.textAlign = "center";
                ctx.strokeStyle = "white"; ctx.lineWidth = 1;
                ctx.strokeText(p.tag, 0, size/2 + 20);
                ctx.fillText(p.tag, 0, size/2 + 20);
                
                ctx.restore();
            });

            requestAnimationFrame(draw);
        }

        const handleStart = (x) => { isDragging = true; lastX = x; };
        const handleMove = (x) => { if(isDragging) { targetAngleY += (x - lastX) * 0.01; lastX = x; } };
        const handleEnd = (x, y) => {
            isDragging = false;
            planets.forEach(p => {
                if(Math.hypot(x - p.lastPos.x, y - p.lastPos.y) < p.lastPos.s / 2 + 10) {
                    isPaused = true;
                    document.getElementById('pTitle').innerText = p.tag;
                    document.getElementById('pText').innerText = p.msg;
                    document.getElementById('overlay').style.display = 'block';
                    document.getElementById('popup').style.display = 'block';
                }
            });
        };

        window.addEventListener('mousedown', e => handleStart(e.clientX));
        window.addEventListener('mousemove', e => handleMove(e.clientX));
        window.addEventListener('mouseup', e => handleEnd(e.clientX, e.clientY));
        window.addEventListener('touchstart', e => handleStart(e.touches[0].clientX));
        window.addEventListener('touchmove', e => handleMove(e.touches[0].clientX));
        window.addEventListener('touchend', e => handleEnd(lastX, height/2));

        document.getElementById('closeBtn').onclick = () => { isPaused = false; document.getElementById('overlay').style.display = 'none'; document.getElementById('popup').style.display = 'none'; draw(); };

        init(); draw();
        window.onresize = init;
    </script>
</body>
</html>
