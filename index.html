<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia✨</title>
    <style>
        body {
            margin: 0;
            background-color: #050208;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Barra estilo la imagen de TikTok */
        .bar {
            position: absolute;
            bottom: 40px;
            width: 85%;
            max-width: 400px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(15, 5, 25, 0.8);
            border: 1px solid rgba(168, 85, 247, 0.4);
            border-radius: 60px;
            padding: 6px 6px 6px 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 30px rgba(107, 33, 212, 0.2);
            z-index: 10;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e0aaff;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: linear-gradient(45deg, #a855f7, #6366f1);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75rem;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
        }

        canvas { display: block; }
    </style>
</head>
<body>

    <canvas id="canvas1"></canvas>

    <div class="bar">
        <input type="text" id="inputField" placeholder="Escribe tu universo..." maxlength="12">
        <button id="generateBtn">Expandir</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas1');
        const ctx = canvas.getContext('2d', { alpha: false }); // Optimización de renderizado
        
        let width, height, particles = [];
        const mouse = { x: null, y: null, radius: 80 };

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('resize', initCanvas);

        class Particle {
            constructor(x, y, color) {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.destX = x;
                this.destY = y;
                this.color = color;
                this.size = Math.random() * 2 + 1;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.friction = 0.9;
                this.ease = 0.05;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }

            update() {
                // Movimiento hacia el texto con suavidad (estilo flotante)
                this.vx += (this.destX - this.x) * this.ease;
                this.vy += (this.destY - this.y) * this.ease;

                // Interacción con mouse
                if (mouse.x !== null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < mouse.radius) {
                        let force = (mouse.radius - dist) / mouse.radius;
                        this.vx -= dx * force * 0.6;
                        this.vy -= dy * force * 0.6;
                    }
                }

                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;
            }
        }

        function createText(text) {
            particles = [];
            const fontSize = Math.min(width / 6, 140);
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "white";
            ctx.font = `bold ${fontSize}px sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text.toUpperCase(), width / 2, height / 2);

            const pixels = ctx.getImageData(0, 0, width, height).data;
            ctx.clearRect(0, 0, width, height);

            // Escaneo optimizado (cada 6 píxeles para ir más rápido)
            for (let y = 0; y < height; y += 6) {
                for (let x = 0; x < width; x += 6) {
                    const index = (y * width + x) * 4;
                    if (pixels[index + 3] > 128) {
                        // Colores de galaxia: púrpuras, azules y rosas
                        const colors = ['#ff00ff', '#7000ff', '#00d4ff', '#ffffff'];
                        const color = colors[Math.floor(Math.random() * colors.length)];
                        particles.push(new Particle(x, y, color));
                    }
                }
            }
        }

        function animate() {
            // Fondo con rastro para efecto "espacial"
            ctx.fillStyle = 'rgba(5, 2, 8, 0.15)';
            ctx.fillRect(0, 0, width, height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        initCanvas();
        createText("GALAXY");
        animate();

        document.getElementById('generateBtn').onclick = () => {
            const txt = document.getElementById('inputField').value;
            if (txt.trim()) createText(txt);
        };
    </script>
</body>
</html>
