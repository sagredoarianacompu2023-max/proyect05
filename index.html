<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> nuestro espacio ✨</title>
    <style>
        body { margin: 0; background-color: #020105; overflow: hidden; touch-action: none; }
        canvas { display: block; cursor: grab; }
    </style>
</head>
<body>
    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let staticStars = [];
        let planetObjects = [];
        const numStars = 400;

        let angleX = 0, angleY = 0;
        let targetAngleX = 0, targetAngleY = 0;
        let isDragging = false;
        let lastMouseX, lastMouseY;

        // Lista de tus 11 imágenes únicas
        const imageSources = [
            'https://i.postimg.cc/QttzBMMn/retouch-2026032222143797.png',
            'https://i.postimg.cc/4dd0K33j/retouch-2026032222151948.png',
            'https://i.postimg.cc/JnnFyhh2/retouch-2026032222155495.png',
            'https://i.postimg.cc/633P7QQP/retouch-2026032222162350.png',
            'https://i.postimg.cc/KzzWKYYJ/retouch-2026032222165608.png',
            'https://i.postimg.cc/8Cw3PvTm/retouch-2026032222222095.png',
            'https://i.postimg.cc/26G2xN12/retouch-2026032222415072.png',
            'https://i.postimg.cc/Qtm0qZFq/retouch-2026032222425111.png',
            'https://i.postimg.cc/j5cZhYDX/retouch-2026032222542337.png',
            'https://i.postimg.cc/769mNr5X/retouch-2026032222550386.png',
            'https://i.postimg.cc/nz201fXv/retouch-2026032222555518.png'
        ];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // Fondo de estrellas
            staticStars = [];
            for (let i = 0; i < numStars; i++) {
                staticStars.push({ x: Math.random() * width, y: Math.random() * height, size: Math.random() * 1.5, op: Math.random() });
            }

            // Crear planetas inmediatamente
            planetObjects = [];
            imageSources.forEach((src, i) => {
                const img = new Image();
                img.src = src; // Empieza a cargar en segundo plano
                
                planetObjects.push({
                    dist: 180 + i * 50,
                    angle: (i * (Math.PI * 2 / imageSources.length)),
                    speed: 0.007 / (1 + i * 0.15),
                    size: 85,
                    zOff: (Math.random() - 0.5) * 50,
                    img: img // Se guardará aquí cuando termine de cargar
                });
            });
        }

        function rotate3D(x, y, z) {
            let cY = Math.cos(angleY), sY = Math.sin(angleY);
            let x1 = x * cY - z * sY;
            let z1 = x * sY + z * cY;
            let cX = Math.cos(angleX), sX = Math.sin(angleX);
            let y1 = y * cX - z1 * sX;
            let z2 = y * sX + z1 * cX;
            const f = 600;
            const s = f / (f + z2);
            return { x: x1 * s + width / 2, y: y1 * s + height / 2, s: s, z: z2 };
        }

        function draw() {
            ctx.fillStyle = '#020105';
            ctx.fillRect(0, 0, width, height);

            // Estrellas
            staticStars.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.op})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
            });

            angleX += (targetAngleX - angleX) * 0.1;
            angleY += (targetAngleY - angleY) * 0.1;

            // Órbitas e Imágenes
            const rendered = planetObjects.map(p => {
                p.angle += p.speed;
                // Dibujar órbita primero
                ctx.beginPath();
                ctx.strokeStyle = "rgba(100, 255, 255, 0.08)";
                for(let a=0; a<Math.PI*2; a+=0.2){
                    const o = rotate3D(Math.cos(a)*p.dist, p.zOff, Math.sin(a)*p.dist);
                    if(a===0) ctx.moveTo(o.x, o.y); else ctx.lineTo(o.x, o.y);
                }
                ctx.closePath(); ctx.stroke();

                return { ...rotate3D(Math.cos(p.angle)*p.dist, p.zOff, Math.sin(p.angle)*p.dist), img: p.img, size: p.size };
            });

            // SOL GIGANTE
            const n = rotate3D(0, 0, 0);
            const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, 120 * n.s);
            g.addColorStop(0, '#fff'); g.addColorStop(0.2, '#ffeb3b'); g.addColorStop(1, 'transparent');
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(n.x, n.y, 160 * n.s, 0, Math.PI*2); ctx.fill();

            // Renderizado de fotos con profundidad
            rendered.sort((a,b) => b.z - a.z);
            rendered.forEach(p => {
                const s = p.size * p.s;
                if (p.img.complete && p.img.naturalWidth !== 0) {
                    ctx.save();
                    ctx.shadowBlur = 10 * p.s; ctx.shadowColor = "white";
                    ctx.drawImage(p.img, p.x - s/2, p.y - s/2, s, s);
                    ctx.restore();
                } else {
                    // Círculo temporal mientras carga la foto
                    ctx.fillStyle = "rgba(255,255,255,0.1)";
                    ctx.beginPath(); ctx.arc(p.x, p.y, s/3, 0, Math.PI*2); ctx.fill();
                }
            });

            requestAnimationFrame(draw);
        }

        const start = (x, y) => { isDragging = true; lastMouseX = x; lastMouseY = y; };
        const move = (x, y) => {
            if (!isDragging) return;
            targetAngleY += (x - lastMouseX) * 0.007;
            targetAngleX -= (y - lastMouseY) * 0.007;
            lastMouseX = x; lastMouseY = y;
        };

        window.addEventListener('mousedown', e => start(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchstart', e => start(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchmove', e => move(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchend', () => isDragging = false);

        init();
        draw();
        window.addEventListener('resize', init);
    </script>
</body>
</html>
