<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partículas de Texto ✨</title>
    <style>
        body {
            margin: 0;
            background-color: #0a0614;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Estilo de la barra de entrada similar a la imagen */
        .bar {
            position: absolute;
            bottom: 30px;
            width: 80%;
            max-width: 400px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(10, 6, 20, 0.75);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 60px;
            padding: 8px 8px 8px 22px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 50px rgba(107, 33, 212, 0.1);
            z-index: 10;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: #a855f7;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.7rem;
            transition: 0.3s;
        }

        button:hover {
            background: #c084fc;
            box-shadow: 0 0 15px #a855f7;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="canvas1"></canvas>

    <div class="bar">
        <input type="text" id="inputField" placeholder="Escribe algo..." maxlength="10">
        <button id="generateBtn">Generar</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas1');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        const numberOfParticles = 2000; // Cantidad de puntos
        const mouse = { x: 0, y: 0, radius: 100 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        class Particle {
            constructor(x, y) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.destX = x;
                this.destY = y;
                this.size = 1.5;
                this.vx = 0;
                this.vy = 0;
                this.acc = 0.8;
                this.friction = 0.85;
                this.color = '#d81b60'; // Rosa/Morado de tu tema
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }

            update() {
                // Movimiento hacia el destino
                let dx = this.destX - this.x;
                let dy = this.destY - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let force = distance * 0.01;

                this.vx += (dx / distance) * force;
                this.vy += (dy / distance) * force;

                // Interacción con mouse (se alejan)
                let mdx = mouse.x - this.x;
                let mdy = mouse.y - this.y;
                let mdist = Math.sqrt(mdx * mdx + mdy * mdy);
                if (mdist < mouse.radius) {
                    this.acc = 2;
                    this.vx -= (mdx / mdist) * 2;
                    this.vy -= (mdy / mdist) * 2;
                }

                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;
            }
        }

        function initText(text) {
            particles = [];
            ctx.fillStyle = 'white';
            ctx.font = 'bold 120px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            
            // Analizar los píxeles del texto dibujado
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Crear partículas solo donde hay pixeles visibles (cada 4 para rendimiento)
            for (let y = 0; y < canvas.height; y += 4) {
                for (let x = 0; x < canvas.width; x += 4) {
                    if (data[(y * canvas.width + x) * 4 + 3] > 128) {
                        particles.push(new Particle(x, y));
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 6, 20, 0.2)'; // Rastro sutil
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        document.getElementById('generateBtn').addEventListener('click', () => {
            const val = document.getElementById('inputField').value;
            if (val) initText(val);
        });

        // Iniciar con tu frase
        initText("TE AMO");
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
