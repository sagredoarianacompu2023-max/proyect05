<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia ✨</title>
    <style>
        body {
            margin: 0;
            background-color: #020105;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; /* Evita el scroll al tocar en móviles */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let stars = [];
        let planets = [];
        const numStars = 280;
        const numPlanets = 6;

        // Variables de interacción
        let mouse = { x: -1000, y: -1000, active: false };
        let rotationOffset = 0;
        let targetRotationSpeed = 0.002;

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Star {
            constructor() {
                this.init();
            }
            init() {
                this.dist = Math.random() * (Math.min(width, height) * 0.45);
                this.angle = Math.random() * Math.PI * 2;
                this.size = Math.random() * 1.5 + 0.5;
                this.baseSpeed = (0.001 + Math.random() * 0.002);
                this.x = 0;
                this.y = 0;
            }
            update() {
                // La velocidad aumenta si el mouse está activo
                let currentSpeed = mouse.active ? this.baseSpeed * 3 : this.baseSpeed;
                this.angle += currentSpeed + rotationOffset;

                let targetX = width / 2 + Math.cos(this.angle) * this.dist;
                let targetY = height / 2 + Math.sin(this.angle) * this.dist;

                // Interacción: Las estrellas se alejan un poco del puntero
                if (mouse.active) {
                    let dx = mouse.x - targetX;
                    let dy = mouse.y - targetY;
                    let d = Math.sqrt(dx*dx + dy*dy);
                    if (d < 100) {
                        targetX -= dx * 0.1;
                        targetY -= dy * 0.1;
                    }
                }

                this.x = targetX;
                this.y = targetY;
            }
            draw() {
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Planet {
            constructor() {
                const colors = ['#ffcc33', '#ff5733', '#33ff57', '#3380ff', '#ff33e6'];
                this.dist = 120 + Math.random() * (Math.min(width, height) * 0.3);
                this.angle = Math.random() * Math.PI * 2;
                this.size = 5 + Math.random() * 5;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.baseSpeed = 0.002 + (1 / this.dist) * 0.5;
            }
            update() {
                this.angle += this.baseSpeed + rotationOffset;
                this.x = width / 2 + Math.cos(this.angle) * this.dist;
                this.y = height / 2 + Math.sin(this.angle) * this.dist;
            }
            draw() {
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function createGalaxy() {
            stars = [];
            planets = [];
            for (let i = 0; i < numStars; i++) stars.push(new Star());
            for (let i = 0; i < numPlanets; i++) planets.push(new Planet());
        }

        function drawNucleus() {
            // El núcleo brilla más si el mouse está cerca del centro
            let pulse = mouse.active ? 1.5 : 1;
            const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, 60 * pulse);
            grad.addColorStop(0, 'white');
            grad.addColorStop(0.3, 'rgba(255, 255, 200, 0.9)');
            grad.addColorStop(1, 'transparent');
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(width/2, height/2, 100 * pulse, 0, Math.PI * 2);
            ctx.fill();
        }

        function animate() {
            ctx.fillStyle = 'rgba(2, 1, 5, 0.2)'; 
            ctx.fillRect(0, 0, width, height);

            drawNucleus();

            stars.forEach(s => { s.update(); s.draw(); });
            planets.forEach(p => { p.update(); p.draw(); });

            requestAnimationFrame(animate);
        }

        // --- EVENTOS DE INTERACCIÓN ---
        const handleMove = (e) => {
            const pos = e.touches ? e.touches[0] : e;
            mouse.x = pos.clientX;
            mouse.y = pos.clientY;
            mouse.active = true;
            rotationOffset = 0.01; // Acelera el giro al mover
        };

        const handleStop = () => {
            mouse.active = false;
            rotationOffset = 0; // Vuelve a velocidad normal
        };

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mousedown', () => mouse.active = true);
        window.addEventListener('mouseup', handleStop);

        window.addEventListener('touchstart', handleMove);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', handleStop);

        window.addEventListener('resize', () => {
            initCanvas();
            createGalaxy();
        });

        initCanvas();
        createGalaxy();
        animate();
    </script>
</body>
</html>
