<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inmersión Galáctica✨</title>
    <style>
        body { margin: 0; background-color: #010005; overflow: hidden; touch-action: none; font-family: sans-serif; }
        
        /* Contenedor principal para el recorte */
        #galaxyContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* CRÍTICO: Recorta todo lo que sobresalga de este contenedor */
        }
        
        canvas { display: block; background: #010005; }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }
        #popup { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 25px; border-radius: 20px; text-align: center; 
            z-index: 1000; width: 80%; border: 2px solid #a855f7;
        }
        #closeBtn { background: #7e22ce; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    
    <div id="galaxyContainer">

        <div id="overlay"></div>
        <div id="popup">
            <h2 id="pTitle" style="color:#7e22ce; margin:0">Recuerdo</h2>
            <p id="pText" style="color:#333; line-height:1.5"></p>
            <button id="closeBtn">Seguir Explorando</button>
        </div>

        <canvas id="galaxyCanvas"></canvas>
        
    </div>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('galaxyContainer'); // Referencia al contenedor
        let width, height, stars = [], planets = [];
        let angleY = 0, targetAngleY = 0, isDragging = false, isPaused = false, lastX;

        const photoData = [
            { src: 'https://i.postimg.cc/QttzBMMn/retouch-2026032222143797.png', tag: 'A tu lado', msg: 'Cada segundo contigo es un regalo.' },
            { src: 'https://i.postimg.cc/4dd0K33j/retouch-2026032222151948.png', tag: 'Esa sonrisa', msg: 'Tu felicidad es mi parte favorita.' },
            { src: 'https://i.postimg.cc/JnnFyhh2/retouch-2026032222155495.png', tag: 'Momentos', msg: 'Guardar recuerdos es lo mejor.' },
            { src: 'https://i.postimg.cc/633P7QQP/retouch-2026032222162350.png', tag: 'Mágico', msg: 'Lo que tenemos es único.' },
            { src: 'https://i.postimg.cc/KzzWKYYJ/retouch-2026032222165608.png', tag: 'Cómplices', msg: 'Gracias por tu compañía.' },
            { src: 'https://i.postimg.cc/8Cw3PvTm/retouch-2026032222222095.png', tag: 'Mi mundo', msg: 'Eres el centro de mi galaxia.' },
            { src: 'https://i.postimg.cc/26G2xN12/retouch-2026032222415072.png', tag: 'Tú y yo', msg: 'Don de sea, pero juntos.' },
            { src: 'https://i.postimg.cc/Qtm0qZFq/retouch-2026032222425111.png', tag: 'Destino', msg: 'El universo nos unió.' },
            { src: 'https://i.postimg.cc/j5cZhYDX/retouch-2026032222542337.png', tag: 'Te quiero', msg: 'Sentimiento infinito.' },
            { src: 'https://i.postimg.cc/769mNr5X/retouch-2026032222550386.png', tag: 'Brillante', msg: 'Tu luz me guía siempre.' },
            { src: 'https://i.postimg.cc/nz201fXv/retouch-2026032222555518.png', tag: 'Para siempre', msg: 'Nuestra historia continúa.' }
        ];

        function init() {
            // Usamos las dimensiones del contenedor para el canvas
            width = canvas.width = container.clientWidth;
            height = canvas.height = container.clientHeight;
            
            stars = Array.from({length: 200}, () => ({ x: Math.random()*width, y: Math.random()*height, s: Math.random()*2 }));
            
            const orbitDist = 450; 
            const totalSpeed = 0.005; 

            planets = photoData.map((d, i) => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = d.src + "?t=" + new Date().getTime();
                
                const randomSize = 80 + Math.random() * 80;

                return {
                    img, ...d,
                    angle: i * (Math.PI * 2 / photoData.length), 
                    dist: orbitDist, 
                    speed: totalSpeed,
                    yOff: (Math.random() - 0.5) * 200, 
                    size: randomSize, 
                    lastPos: {x:0, y:0, s:0}
                };
            });
        }

        function draw() {
            if(isPaused) return;
            ctx.fillStyle = '#010005';
            ctx.fillRect(0, 0, width, height);
            
            // --- MODIFICACIÓN: APLICAR RECORTE EN EL CANVAS ---
            // Creamos una ruta rectangular del tamaño del canvas y recortamos todo lo que se dibuje después.
            ctx.save(); // Guardamos el estado sin recortar
            ctx.beginPath();
            ctx.rect(0, 0, width, height);
            ctx.clip(); // Todo lo siguiente estará dentro del rectángulo

            ctx.fillStyle = "white";
            stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

            angleY += (targetAngleY - angleY) * 0.1;

            ctx.beginPath();
            ctx.strokeStyle = "rgba(100, 255, 255, 0.08)";
            ctx.arc(width/2, height/2, 450, 0, Math.PI*2);
            ctx.stroke();

            planets.forEach(p => {
                p.angle -= p.speed; 
                
                const x3d = Math.cos(p.angle + angleY) * p.dist;
                const z3d = Math.sin(p.angle + angleY) * p.dist;
                
                const scale = 500 / (500 + z3d);
                const x2d = x3d * scale + width / 2;
                const y2d = (z3d * 0.2) * scale + p.yOff + height / 2; 
                const size = p.size * scale;

                p.lastPos = { x: x2d, y: y2d, s: size };

                ctx.save();
                ctx.translate(x2d, y2d);

                if (p.img.complete && p.img.naturalWidth !== 0) {
                    ctx.shadowBlur = 15; ctx.shadowColor = "rgba(168, 85, 247, 0.4)";
                    ctx.drawImage(p.img, -size/2, -size/2, size, size);
                } else {
                    ctx.fillStyle = "#333";
                    ctx.beginPath(); ctx.arc(0, 0, size/2, 0, Math.PI*2); ctx.fill();
                }

                ctx.shadowBlur = 0;
                ctx.fillStyle = "white";
                ctx.font = `bold ${18 * scale}px sans-serif`; 
                ctx.textAlign = "center";
                ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 1;
                
                // --- MODIFICACIÓN: REVISAR SI EL TEXTO ESTÁ EN PANTALLA ---
                // Calculamos los límites del texto y solo lo dibujamos si está dentro del canvas.
                const textY = size/2 + 20;
                //ctx.strokeText(p.tag, 0, textY); // Eliminado para un look más limpio, pero puedes volver a activarlo
                ctx.fillText(p.tag, 0, textY);
                
                ctx.restore();
            });
            
            ctx.restore(); // Restauramos el estado sin recortar del canvas

            requestAnimationFrame(draw);
        }

        const handleStart = (x) => { isDragging = true; lastX = x; };
        const handleMove = (x) => { if(isDragging) { targetAngleY += (x - lastX) * 0.01; lastX = x; } };
        const handleEnd = (x, y) => {
            isDragging = false;
            planets.forEach(p => {
                const d = Math.hypot(x - p.lastPos.x, y - p.lastPos.y);
                if(d < p.lastPos.s / 2 + 10) {
                    isPaused = true;
                    document.getElementById('pTitle').innerText = p.tag;
                    document.getElementById('pText').innerText = p.msg;
                    document.getElementById('overlay').style.display = 'block';
                    document.getElementById('popup').style.display = 'block';
                }
            });
        };

        container.addEventListener('mousedown', e => handleStart(e.clientX));
        container.addEventListener('mousemove', e => handleMove(e.clientX));
        container.addEventListener('mouseup', e => handleEnd(e.clientX, e.clientY));
        container.addEventListener('touchstart', e => handleStart(e.touches[0].clientX));
        container.addEventListener('touchmove', e => handleMove(e.touches[0].clientX));
        container.addEventListener('touchend', e => handleEnd(lastX, height/2));

        document.getElementById('closeBtn').onclick = () => { isPaused = false; document.getElementById('overlay').style.display = 'none'; document.getElementById('popup').style.display = 'none'; draw(); };

        init(); draw();
        window.onresize = init;
    </script>
</body>
</html>
