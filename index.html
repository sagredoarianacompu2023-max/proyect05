<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galaxia de Recuerdos ✨</title>
    <style>
        body { margin: 0; background-color: #010005; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; background: #010005; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }
        #popup { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 25px; border-radius: 20px; text-align: center; 
            z-index: 1000; width: 85%; border: 2px solid #a855f7; box-shadow: 0 0 20px #a855f7;
        }
        #closeBtn { background: #7e22ce; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-weight: bold; z-index: 2000; }
    </style>
</head>
<body>

    <div id="loading">Cargando Galaxia...</div>

    <div id="overlay"></div>
    <div id="popup">
        <h2 id="pTitle" style="color:#7e22ce; margin:0">Recuerdo</h2>
        <p id="pText" style="color:#333; line-height:1.5"></p>
        <button id="closeBtn">Volver</button>
    </div>

    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [], planets = [];
        let angleY = 0, targetAngleY = 0, isDragging = false, isPaused = false, lastX;

        const photoData = [
            { src: 'https://i.postimg.cc/QttzBMMn/retouch-2026032222143797.png', tag: 'A tu lado', msg: 'Cada segundo contigo es un regalo.' },
            { src: 'https://i.postimg.cc/4dd0K33j/retouch-2026032222151948.png', tag: 'Esa sonrisa', msg: 'Tu felicidad es mi parte favorita.' },
            { src: 'https://i.postimg.cc/JnnFyhh2/retouch-2026032222155495.png', tag: 'Momentos', msg: 'Guardar recuerdos es lo mejor.' },
            { src: 'https://i.postimg.cc/633P7QQP/retouch-2026032222162350.png', tag: 'Mágico', msg: 'Lo que tenemos es único.' },
            { src: 'https://i.postimg.cc/KzzWKYYJ/retouch-2026032222165608.png', tag: 'Cómplices', msg: 'Gracias por tu compañía.' },
            { src: 'https://i.postimg.cc/8Cw3PvTm/retouch-2026032222222095.png', tag: 'Mi mundo', msg: 'Eres el centro de mi galaxia.' },
            { src: 'https://i.postimg.cc/26G2xN12/retouch-2026032222415072.png', tag: 'Tú y yo', msg: 'Donde sea, pero juntos.' },
            { src: 'https://i.postimg.cc/Qtm0qZFq/retouch-2026032222425111.png', tag: 'Destino', msg: 'El universo nos unió.' },
            { src: 'https://i.postimg.cc/j5cZhYDX/retouch-2026032222542337.png', tag: 'Te quiero', msg: 'Sentimiento infinito.' },
            { src: 'https://i.postimg.cc/769mNr5X/retouch-2026032222550386.png', tag: 'Brillante', msg: 'Tu luz me guía siempre.' },
            { src: 'https://i.postimg.cc/nz201fXv/retouch-2026032222555518.png', tag: 'Para siempre', msg: 'Nuestra historia continúa.' }
        ];

        let imagesLoaded = 0;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = Array.from({length: 100}, () => ({ x: Math.random()*width, y: Math.random()*height, s: Math.random()*2 }));
            
            const baseDist = 160; 
            const spacing = 70;   
            
            planets = photoData.map((d, i) => {
                const img = new Image();
                img.crossOrigin = "anonymous"; // CRÍTICO: Para evitar que el canvas se bloquee
                img.onload = () => { 
                    imagesLoaded++; 
                    if(imagesLoaded >= 1) document.getElementById('loading').style.display = 'none';
                };
                img.src = d.src; 
                
                return {
                    img, ...d,
                    angle: i * 0.5, 
                    selfRotation: Math.random() * 5,
                    dist: baseDist + (i * spacing), 
                    speed: 0.003 - (i * 0.0001),    
                    size: 90 + Math.random() * 60, 
                    lastPos: {x:0, y:0, s:0}
                };
            });
        }

        function draw() {
            if(isPaused) return;
            ctx.fillStyle = '#010005';
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = "white";
            stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

            angleY += (targetAngleY - angleY) * 0.05;

            // SOL GIGANTE
            const sunGrad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, 110);
            sunGrad.addColorStop(0, '#fff'); sunGrad.addColorStop(0.3, '#ffcc00'); sunGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = sunGrad;
            ctx.beginPath(); ctx.arc(width/2, height/2, 160, 0, Math.PI*2); ctx.fill();

            // Dibujar Planetas en Fila y con ZOOM cercano
            planets.forEach(p => {
                p.angle -= p.speed;
                p.selfRotation += 0.01;

                const x3d = Math.cos(p.angle + angleY) * p.dist;
                const z3d = Math.sin(p.angle + angleY) * p.dist;
                
                // ZOOM: Focal 300 para acercar mucho los planetas al frente
                const scale = 300 / (300 + z3d);
                const x2d = x3d * scale + width / 2;
                const y2d = (z3d * 0.3) * scale + height / 2; 
                const size = p.size * scale;

                p.lastPos = { x: x2d, y: y2d, s: size };

                // Dibujar solo si está en el rango visible
                if (z3d < 250) {
                    ctx.save();
                    ctx.translate(x2d, y2d);
                    ctx.rotate(p.selfRotation);

                    if (p.img.complete && p.img.naturalWidth !== 0) {
                        ctx.shadowBlur = 15; ctx.shadowColor = "#a855f7";
                        ctx.drawImage(p.img, -size/2, -size/2, size, size);
                    } else {
                        // Planeta de color si la imagen falla
                        ctx.fillStyle = "#333";
                        ctx.beginPath(); ctx.arc(0, 0, size/2, 0, Math.PI*2); ctx.fill();
                    }
                    ctx.restore();

                    // Texto violeta fijo
                    ctx.fillStyle = "#a855f7";
                    ctx.font = `bold ${16 * scale}px sans-serif`;
                    ctx.textAlign = "center";
                    ctx.strokeStyle = "white"; ctx.lineWidth = 1;
                    ctx.strokeText(p.tag, x2d, y2d + size/2 + 20);
                    ctx.fillText(p.tag, x2d, y2d + size/2 + 20);
                }
            });

            requestAnimationFrame(draw);
        }

        const start = (x) => { isDragging = true; lastX = x; };
        const move = (x) => { if(isDragging) { targetAngleY += (x - lastX) * 0.01; lastX = x; } };
        const end = (x, y) => {
            isDragging = false;
            planets.forEach(p => {
                const d = Math.hypot(x - p.lastPos.x, y - p.lastPos.y);
                if(d < p.lastPos.s / 2 + 10) {
                    isPaused = true;
                    document.getElementById('pTitle').innerText = p.tag;
                    document.getElementById('pText').innerText = p.msg;
                    document.getElementById('overlay').style.display = 'block';
                    document.getElementById('popup').style.display = 'block';
                }
            });
        };

        window.addEventListener('mousedown', e => start(e.clientX));
        window.addEventListener('mousemove', e => move(e.clientX));
        window.addEventListener('mouseup', e => end(e.clientX, e.clientY));
        window.addEventListener('touchstart', e => start(e.touches[0].clientX));
        window.addEventListener('touchmove', e => move(e.touches[0].clientX));
        window.addEventListener('touchend', e => end(lastX, height/2));

        document.getElementById('closeBtn').onclick = () => { 
            isPaused = false; 
            document.getElementById('overlay').style.display = 'none'; 
            document.getElementById('popup').style.display = 'none'; 
            draw(); 
        };

        init(); draw();
        window.onresize = init;
    </script>
</body>
</html>
