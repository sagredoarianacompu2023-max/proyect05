<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia Realista ✨</title>
    <style>
        body {
            margin: 0;
            background-color: #020105;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            filter: contrast(1.1) brightness(1.1);
        }
    </style>
</head>
<body>

    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let stars = [];
        let planets = [];
        const numStars = 280;
        const numPlanets = 6;

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Star {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = width / 2;
                this.y = height / 2;
                this.size = Math.random() * 2;
                this.angle = Math.random() * Math.PI * 2;
                this.dist = Math.random() * (Math.min(width, height) * 0.45);
                this.speed = (0.001 + Math.random() * 0.003);
            }
            update() {
                this.angle += this.speed;
                this.currentX = width / 2 + Math.cos(this.angle) * this.dist;
                this.currentY = height / 2 + Math.sin(this.angle) * this.dist;
            }
            draw() {
                ctx.fillStyle = "white";
                // Efecto de brillo para las estrellas blancas
                ctx.shadowBlur = 5;
                ctx.shadowColor = "white";
                ctx.beginPath();
                ctx.arc(this.currentX, this.currentY, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Planet {
            constructor() {
                const colors = ['#ffcc33', '#ff5733', '#33ff57', '#3380ff', '#ff33e6'];
                this.dist = 100 + Math.random() * (Math.min(width, height) * 0.35);
                this.angle = Math.random() * Math.PI * 2;
                this.size = 4 + Math.random() * 6;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.speed = 0.002 + (1 / this.dist) * 0.5; // Los más lejanos van más lento
            }
            update() {
                this.angle += this.speed;
                this.x = width / 2 + Math.cos(this.angle) * this.dist;
                this.y = height / 2 + Math.sin(this.angle) * this.dist;
            }
            draw() {
                // Sombra del planeta
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                // Brillo de "atmósfera"
                ctx.strokeStyle = "rgba(255,255,255,0.3)";
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        function createGalaxy() {
            stars = [];
            planets = [];
            for (let i = 0; i < numStars; i++) stars.push(new Star());
            for (let i = 0; i < numPlanets; i++) planets.push(new Planet());
        }

        function drawNucleus() {
            const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, 60);
            grad.addColorStop(0, 'white');
            grad.addColorStop(0.2, 'rgba(255, 255, 150, 0.8)');
            grad.addColorStop(0.5, 'rgba(168, 85, 247, 0.3)');
            grad.addColorStop(1, 'transparent');
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(width/2, height/2, 80, 0, Math.PI * 2);
            ctx.fill();
        }

        function animate() {
            ctx.fillStyle = 'rgba(2, 1, 5, 0.2)'; // Rastro para movimiento fluido
            ctx.fillRect(0, 0, width, height);

            drawNucleus();

            stars.forEach(s => { s.update(); s.draw(); });
            planets.forEach(p => { p.update(); p.draw(); });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            initCanvas();
            createGalaxy();
        });

        initCanvas();
        createGalaxy();
        animate();
    </script>
</body>
</html>
