<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universo de Recuerdos ✨</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }
        #popup { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 30px; border-radius: 25px; text-align: center; 
            z-index: 1000; width: 80%; border: 2px solid #a855f7; box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
        }
        #closeBtn { background: #7e22ce; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="overlay"></div>
    <div id="popup">
        <h2 id="pTitle" style="color:#7e22ce; margin:0">Recuerdo</h2>
        <p id="pText" style="color:#333; line-height:1.6"></p>
        <button id="closeBtn">Cerrar</button>
    </div>

    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [], planets = [];
        let angleY = 0, targetAngleY = 0, isDragging = false, isPaused = false, lastX;

        const photoData = [
            { src: 'https://i.postimg.cc/QttzBMMn/retouch-2026032222143797.png', tag: 'A tu lado', msg: 'Cada segundo contigo es un regalo.' },
            { src: 'https://i.postimg.cc/4dd0K33j/retouch-2026032222151948.png', tag: 'Esa sonrisa', msg: 'Tu felicidad es mi parte favorita.' },
            { src: 'https://i.postimg.cc/JnnFyhh2/retouch-2026032222155495.png', tag: 'Momentos', msg: 'Guardar recuerdos es lo mejor.' },
            { src: 'https://i.postimg.cc/633P7QQP/retouch-2026032222162350.png', tag: 'Mágico', msg: 'Lo que tenemos es único.' },
            { src: 'https://i.postimg.cc/KzzWKYYJ/retouch-2026032222165608.png', tag: 'Cómplices', msg: 'Gracias por tu compañía.' },
            { src: 'https://i.postimg.cc/8Cw3PvTm/retouch-2026032222222095.png', tag: 'Mi mundo', msg: 'Eres el centro de mi galaxia.' },
            { src: 'https://i.postimg.cc/26G2xN12/retouch-2026032222415072.png', tag: 'Tú y yo', msg: 'Donde sea, pero juntos.'},
            { src: 'https://i.postimg.cc/Qtm0qZFq/retouch-2026032222425111.png', tag: 'Destino', msg: 'El universo nos unió.' },
            { src: 'https://i.postimg.cc/j5cZhYDX/retouch-2026032222542337.png', tag: 'Te quiero', msg: 'Sentimiento infinito.' },
            { src: 'https://i.postimg.cc/769mNr5X/retouch-2026032222550386.png', tag: 'Brillante', msg: 'Tu luz me guía siempre.' },
            { src: 'https://i.postimg.cc/nz201fXv/retouch-2026032222555518.png', tag: 'Para siempre', msg: 'Nuestra historia continúa.' }
        ];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            stars = Array.from({length: 150}, () => ({ 
                x: Math.random()*width, 
                y: Math.random()*height, 
                s: Math.random()*2,
                o: Math.random()
            }));
            
            // Órbita única
            const orbitDist = 500; 
            planets = photoData.map((d, i) => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = d.src + "?t=" + Date.now();
                
                return {
                    img, ...d,
                    angle: i * 0.5,0.9,
                    dist: orbitDist,
                    speed: 0.001,
                    size: 20 + Math.random() * 60, // PLANETAS MÁS GRANDES
                    lastPos: {x:0, y:0, s:0}
                };
            });
        }

        function draw() {
            if(isPaused) return;
            ctx.fillStyle = '#010005';
            ctx.fillRect(0, 0, width, height);

            // Estrellas con parpadeo
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.globalAlpha = 0.5 + Math.sin(Date.now()*0.001 + s.x)*0.5;
                ctx.fillRect(s.x, s.y, s.s, s.s);
            });
            ctx.globalAlpha = 1;

            angleY += (targetAngleY - angleY) * 0.1;

            // Ordenar por profundidad (Z-index manual)
            const sorted = [...planets].sort((a,b) => {
                return Math.sin(b.angle + angleY) - Math.sin(a.angle + angleY);
            });

            sorted.forEach(p => {
                p.angle -= p.speed;
                
                const x3d = Math.cos(p.angle + angleY) * p.dist;
                const z3d = Math.sin(p.angle + angleY) * p.dist;
                
                // Solo dibujamos si está en la parte de adelante (z3d < 0)
                // O aplicamos un desvanecimiento si se aleja
                let opacity = 1;
                if (z3d > 0) opacity = Math.max(0, 1 - z3d/200); 

                if (opacity > 0) {
                    const scale = 600 / (600 + z3d); // Punto de vista muy cercano
                    const x2d = x3d * scale + width / 2;
                    const y2d = height / 2; 
                    const size = p.size * scale;

                    p.lastPos = { x: x2d, y: y2d, s: size };

                    ctx.save();
                    ctx.globalAlpha = opacity;
                    ctx.translate(x2d, y2d);

                    if (p.img.complete && p.img.naturalWidth !== 0) {
                        ctx.shadowBlur = 20; ctx.shadowColor = "rgba(255,255,255,0.2)";
                        ctx.drawImage(p.img, -size/2, -size/2, size, size);
                    } else {
                        ctx.fillStyle = "rgba(255,255,255,0.1)";
                        ctx.beginPath(); ctx.arc(0, 0, size/2, 0, Math.PI*2); ctx.fill();
                    }

                    // Texto Blanco Elegante
                    ctx.fillStyle = "white";
                    ctx.font = `100 ${7 * scale}px sans-serif`;
                    ctx.textAlign = "center";
                    ctx.fillText(p.tag.toUpperCase(), 0, size/2 + 35);
                    
                    ctx.restore();
                }
            });

            requestAnimationFrame(draw);
        }

        const handleStart = (x) => { isDragging = true; lastX = x; };
        const handleMove = (x) => { if(isDragging) { targetAngleY += (x - lastX) * 0.01; lastX = x; } };
        const handleEnd = (x, y) => {
            isDragging = false;
            planets.forEach(p => {
                const d = Math.hypot(x - p.lastPos.x, y - p.lastPos.y);
                if(d < p.lastPos.s / 2 + 10) {
                    isPaused = true;
                    document.getElementById('pTitle').innerText = p.tag;
                    document.getElementById('pText').innerText = p.msg;
                    document.getElementById('overlay').style.display = 'block';
                    document.getElementById('popup').style.display = 'block';
                }
            });
        };

        window.addEventListener('mousedown', e => handleStart(e.clientX));
        window.addEventListener('mousemove', e => handleMove(e.clientX));
        window.addEventListener('mouseup', e => handleEnd(e.clientX, e.clientY));
        window.addEventListener('touchstart', e => handleStart(e.touches[0].clientX));
        window.addEventListener('touchmove', e => handleMove(e.touches[0].clientX));
        window.addEventListener('touchend', e => handleEnd(lastX, height/2));

        document.getElementById('closeBtn').onclick = () => { 
            isPaused = false; 
            document.getElementById('overlay').style.display = 'none'; 
            document.getElementById('popup').style.display = 'none'; 
            draw(); 
        };

        init(); draw();
        window.onresize = init;
    </script>
</body>
</html>
