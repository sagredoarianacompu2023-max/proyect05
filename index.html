<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galaxia Inmersiva ✨</title>
    <style>
        body { margin: 0; background-color: #010005; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; background: #010005; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; }
        #popup { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 20px; border-radius: 20px; text-align: center; 
            z-index: 1000; width: 80%; box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
            border: 2px solid #a855f7;
        }
        #closeBtn { background: #7e22ce; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="overlay"></div>
    <div id="popup">
        <h2 id="pTitle" style="color:#7e22ce">Recuerdo</h2>
        <p id="pText" style="color:#333"></p>
        <button id="closeBtn">Volver</button>
    </div>

    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, staticStars = [], planetObjects = [];
        let angleX = 0, angleY = 0, targetAngleX = 0, targetAngleY = 0;
        let isDragging = false, isPaused = false, lastX, lastY;

        const photoData = [
            { src: 'https://i.postimg.cc/QttzBMMn/retouch-2026032222143797.png', tag: 'A tu lado', msg: 'Cada segundo contigo es un regalo.' },
            { src: 'https://i.postimg.cc/4dd0K33j/retouch-2026032222151948.png', tag: 'Esa sonrisa', msg: 'Tu felicidad es mi parte favorita.' },
            { src: 'https://i.postimg.cc/JnnFyhh2/retouch-2026032222155495.png', tag: 'Momentos', msg: 'Guardar recuerdos es lo mejor.' },
            { src: 'https://i.postimg.cc/633P7QQP/retouch-2026032222162350.png', tag: 'Mágico', msg: 'Lo que tenemos es único.' },
            { src: 'https://i.postimg.cc/KzzWKYYJ/retouch-2026032222165608.png', tag: 'Cómplices', msg: 'Gracias por tu compañía.' },
            { src: 'https://i.postimg.cc/8Cw3PvTm/retouch-2026032222222095.png', tag: 'Mi mundo', msg: 'Eres el centro de mi galaxia.' },
            { src: 'https://i.postimg.cc/26G2xN12/retouch-2026032222415072.png', tag: 'Tú y yo', msg: 'Donde sea, pero juntos.' },
            { src: 'https://i.postimg.cc/Qtm0qZFq/retouch-2026032222425111.png', tag: 'Destino', msg: 'El universo nos unió.' },
            { src: 'https://i.postimg.cc/j5cZhYDX/retouch-2026032222542337.png', tag: 'Te quiero', msg: 'Sentimiento infinito.' },
            { src: 'https://i.postimg.cc/769mNr5X/retouch-2026032222550386.png', tag: 'Brillante', msg: 'Tu luz me guía siempre.' },
            { src: 'https://i.postimg.cc/nz201fXv/retouch-2026032222555518.png', tag: 'Para siempre', msg: 'Nuestra historia continúa.' }
        ];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            staticStars = [];
            for (let i = 0; i < 200; i++) {
                staticStars.push({ x: (Math.random()-0.5)*2000, y: (Math.random()-0.5)*2000, z: (Math.random()-0.5)*2000, sz: Math.random()*2 });
            }
            planetObjects = [];
            photoData.forEach((data, i) => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = data.src;
                planetObjects.push({
                    dist: 300 + (i * 40),
                    angle: (i * (Math.PI * 2 / photoData.length)),
                    speed: 0.007,
                    yOff: (Math.random() - 0.5) * 300,
                    img: img, tag: data.tag, msg: data.msg, size: 150
                });
            });
        }

        function project(x, y, z) {
            let cosX = Math.cos(angleX), sinX = Math.sin(angleX);
            let cosY = Math.cos(angleY), sinY = Math.sin(angleY);
            let ty = y * cosX - z * sinX;
            let tz = y * sinX + z * cosX;
            let tx = x * cosY - tz * sinY;
            tz = x * sinY + tz * cosY;
            const focal = 400;
            const scale = focal / (focal + tz);
            return { x: tx * scale + width / 2, y: ty * scale + height / 2, scale, z: tz, visible: tz > -350 };
        }

        function draw() {
            if(isPaused) return;
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#010005';
            ctx.fillRect(0, 0, width, height);

            angleX += (targetAngleX - angleX) * 0.08;
            angleY += (targetAngleY - angleY) * 0.08;

            // Estrellas
            ctx.fillStyle = "white";
            staticStars.forEach(s => {
                let p = project(s.x, s.y, s.z);
                if (p.visible && p.scale > 0) {
                    ctx.beginPath(); ctx.arc(p.x, p.y, s.sz * p.scale, 0, Math.PI*2); ctx.fill();
                }
            });

            // Planetas y Órbitas
            const rendered = planetObjects.map(p => {
                p.angle -= p.speed;
                let x = Math.cos(p.angle) * p.dist;
                let z = Math.sin(p.angle) * p.dist;
                let pos = project(x, p.yOff, z);
                p.lastPos = pos;
                return { data: p, pos };
            }).filter(r => r.pos.visible && r.pos.scale > 0).sort((a, b) => b.pos.z - a.pos.z);

            rendered.forEach(r => {
                const p = r.data;
                const pos = r.pos;
                const s = p.size * pos.scale;

                // Órbita
                ctx.beginPath();
                ctx.strokeStyle = "rgba(168, 85, 247, 0.2)";
                ctx.arc(width/2, height/2, p.dist * pos.scale, 0, Math.PI*2);
                ctx.stroke();

                ctx.save();
                ctx.translate(pos.x, pos.y);
                if (p.img.complete && p.img.naturalWidth !== 0) {
                    ctx.shadowBlur = 15 * pos.scale;
                    ctx.shadowColor = "#a855f7";
                    ctx.drawImage(p.img, -s/2, -s/2, s, s);
                    
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = "#a855f7";
                    ctx.font = `bold ${22 * pos.scale}px sans-serif`;
                    ctx.textAlign = "center";
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 1.5 * pos.scale;
                    ctx.strokeText(p.tag, 0, (s/2) + 25 * pos.scale);
                    ctx.fillText(p.tag, 0, (s/2) + 25 * pos.scale);
                }
                ctx.restore();
            });
            requestAnimationFrame(draw);
        }

        // Interacciones
        const start = (x, y) => { isDragging = true; lastX = x; lastY = y; };
        const move = (x, y) => { if(!isDragging || isPaused) return; targetAngleY += (x - lastX) * 0.008; targetAngleX -= (y - lastY) * 0.008; lastX = x; lastY = y; };
        const end = (x,y) => {
            isDragging = false;
            planetObjects.forEach(p => {
                if(p.lastPos && Math.hypot(x - p.lastPos.x, y - p.lastPos.y) < 60 * p.lastPos.scale) {
                    isPaused = true;
                    document.getElementById('pTitle').innerText = p.tag;
                    document.getElementById('pText').innerText = p.msg;
                    document.getElementById('overlay').style.display = 'block';
                    document.getElementById('popup').style.display = 'block';
                }
            });
        };

        window.addEventListener('mousedown', e => start(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
        window.addEventListener('mouseup', e => end(e.clientX, e.clientY));
        window.addEventListener('touchstart', e => start(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchmove', e => move(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchend', e => end(lastX, lastY));

        document.getElementById('closeBtn').onclick = () => {
            isPaused = false; document.getElementById('overlay').style.display = 'none';
            document.getElementById('popup').style.display = 'none'; draw();
        };

        init(); draw();
        window.onresize = init;
    </script>
</body>
</html>
