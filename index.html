<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro espacio ✨</title>
    <style>
        body {
            margin: 0;
            background-color: #020105;
            overflow: hidden;
            touch-action: none;
        }
        canvas { display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }
    </style>
</head>
<body>

    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let staticStars = [];
        let planetImages = [];
        const numStars = 450; 
        const totalPlanets = 8; // Mercurio, Venus, Tierra, Marte, Júpiter, Saturno, Urano, Neptuno

        let angleX = 0, angleY = 0;
        let targetAngleX = 0, targetAngleY = 0;
        let isDragging = false;
        let lastMouseX, lastMouseY;

        // --- TU FOTO PNG AQUÍ ---
        const planeteImagen = new Image();
        planeteImagen.src = 'https://i.postimg.cc/GhDmKCJJ/retouch-2026032018130123.png'; 

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // Estrellas de fondo que no se mueven
            staticStars = [];
            for (let i = 0; i < numStars; i++) {
                staticStars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 1.3,
                    opacity: Math.random()
                });
            }

            // Crear los 8 planetas con distancias escalonadas
            planetImages = [];
            for (let i = 0; i < totalPlanets; i++) {
                planetImages.push({
                    dist: 130 + i * 55, // Cada planeta más lejos que el anterior
                    orbitAngle: Math.random() * Math.PI * 2,
                    // Los planetas interiores son más rápidos (como en la realidad)
                    speed: 0.015 / (1 + i * 0.5), 
                    size: 70 + Math.random() * 20, 
                    zOffset: (Math.random() - 0.5) * 100 
                });
            }
        }

        function rotate3D(x, y, z) {
            let cosY = Math.cos(angleY), sinY = Math.sin(angleY);
            let x1 = x * cosY - z * sinY;
            let z1 = x * sinY + z * cosY;

            let cosX = Math.cos(angleX), sinX = Math.sin(angleX);
            let y1 = y * cosX - z1 * sinX;
            let z2 = y * sinX + z1 * cosX;

            const focal = 500;
            const scale = focal / (focal + z2);
            return {
                x: x1 * scale + width / 2,
                y: y1 * scale + height / 2,
                scale: scale,
                z: z2
            };
        }

        function draw() {
            ctx.fillStyle = '#020105';
            ctx.fillRect(0, 0, width, height);

            // Estrellas estáticas
            staticStars.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });

            angleX += (targetAngleX - angleX) * 0.08;
            angleY += (targetAngleY - angleY) * 0.08;

            // Sol / Núcleo central
            const n = rotate3D(0, 0, 0);
            const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, 65 * n.scale);
            grad.addColorStop(0, '#fff');
            grad.addColorStop(0.2, '#fff9c4');
            grad.addColorStop(0.5, 'rgba(255, 200, 50, 0.4)');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(n.x, n.y, 90 * n.scale, 0, Math.PI * 2);
            ctx.fill();

            // Renderizar los 8 planetas
            const rendered = planetImages.map(p => {
                p.orbitAngle += p.speed;
                let x = Math.cos(p.orbitAngle) * p.dist;
                let z = Math.sin(p.orbitAngle) * p.dist;
                return { ...rotate3D(x, p.zOffset, z), size: p.size };
            });

            // Ordenar por profundidad para que se tapen correctamente
            rendered.sort((a, b) => b.z - a.z);

            rendered.forEach(p => {
                const s = p.size * p.scale;
                if (planeteImagen.complete && planeteImagen.naturalWidth !== 0) {
                    ctx.save();
                    // Brillo de atmósfera para cada foto
                    ctx.shadowBlur = 15 * p.scale;
                    ctx.shadowColor = "rgba(100, 200, 255, 0.5)";
                    ctx.drawImage(planeteImagen, p.x - s/2, p.y - s/2, s, s);
                    ctx.restore();
                } else {
                    // Marcador si la imagen no carga
                    ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, s/2.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            requestAnimationFrame(draw);
        }

        // --- Controles táctiles y mouse ---
        const start = (x, y) => { isDragging = true; lastMouseX = x; lastMouseY = y; };
        const move = (x, y) => {
            if (!isDragging) return;
            targetAngleY += (x - lastMouseX) * 0.007;
            targetAngleX -= (y - lastMouseY) * 0.007;
            lastMouseX = x; lastMouseY = y;
        };

        window.addEventListener('mousedown', e => start(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchstart', e => start(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchmove', e => move(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchend', () => isDragging = false);

        init();
        draw();
        window.addEventListener('resize', init);
    </script>
</body>
</html>
