<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia con Imagen 🌌</title>
    <style>
        body {
            margin: 0;
            background-color: #020105;
            overflow: hidden;
            touch-action: none;
        }
        canvas { display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }
    </style>
</head>
<body>

    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let staticStars = [];
        let planetImages = [];
        const numStars = 400; // Estrellas fijas al fondo
        const numPlanets = 5; // Número de imágenes/planetas

        const planeteImagen = new Image();
        planeteImagen.src = 'https://i.postimg.cc/GhDmKCJJ/retouch-2026032018130123.png'; // URL de ejemplo, cámbiala luego

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // 1. Crear estrellas de fondo (ESTÁTICAS)
            staticStars = [];
            for (let i = 0; i < numStars; i++) {
                staticStars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 1.5,
                    opacity: Math.random()
                });
            }

            // 2. Crear objetos 3D con imagen
            planetImages = [];
            for (let i = 0; i < numPlanets; i++) {
                planetImages.push({
                    dist: 150 + i * 50, // Radio de órbita
                    orbitAngle: Math.random() * Math.PI * 2,
                    speed: 0.003 + (Math.random() * 0.008),
                    size: 50 + Math.random() * 30, // Tamaño de la imagen
                    // Coordenada Z para el 3D
                    zOffset: (Math.random() - 0.5) * 120 
                });
            }
        }

            // Proyección de perspectiva simple
            const focalLength = 400;
            const scale = focalLength / (focalLength + z);
            return {
                x: x * scale + width / 2,
                y: y * scale + height / 2,
                scale: scale
            };
        }
