<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vuelo Espacial de Recuerdos ✨</title>
    <style>
        body { margin: 0; background-color: #010005; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; cursor: move; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }
        #popup { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 20px; text-align: center; 
            z-index: 1000; max-width: 80%; box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
        }
        #closeBtn { background: #7e22ce; color: white; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay"></div>
    <div id="popup">
        <h2 id="pTitle" style="color:#7e22ce">Recuerdo</h2>
        <p id="pText" style="color:#444"></p>
        <button id="closeBtn">Continuar Vuelo</button>
    </div>

    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, staticStars = [], planetObjects = [];
        let angleX = 0, angleY = 0, targetAngleX = 0, targetAngleY = 0;
        let isDragging = false, isPaused = false, lastX, lastY;

        const photoData = [
            { src: 'https://i.postimg.cc/QttzBMMn/retouch-2026032222143797.png', tag: 'A tu lado', msg: 'Cada segundo contigo es un regalo.' },
            { src: 'https://i.postimg.cc/4dd0K33j/retouch-2026032222151948.png', tag: 'Esa sonrisa', msg: 'Tu felicidad es mi parte favorita.' },
            { src: 'https://i.postimg.cc/JnnFyhh2/retouch-2026032222155495.png', tag: 'Momentos', msg: 'Guardar recuerdos contigo es lo mejor.' },
            { src: 'https://i.postimg.cc/633P7QQP/retouch-2026032222162350.png', tag: 'Mágico', msg: 'Lo que tenemos es único.' },
            { src: 'https://i.postimg.cc/KzzWKYYJ/retouch-2026032222165608.png', tag: 'Cómplices', msg: 'Gracias por tu compañía.' },
            { src: 'https://i.postimg.cc/8Cw3PvTm/retouch-2026032222222095.png', tag: 'Mi mundo', msg: 'Eres el centro de mi galaxia.' },
            { src: 'https://i.postimg.cc/26G2xN12/retouch-2026032222415072.png', tag: 'Tú y yo', msg: 'Donde sea, pero siempre juntos.' },
            { src: 'https://i.postimg.cc/Qtm0qZFq/retouch-2026032222425111.png', tag: 'Destino', msg: 'El universo nos unió.' },
            { src: 'https://i.postimg.cc/j5cZhYDX/retouch-2026032222542337.png', tag: 'Te quiero', msg: 'Sentimiento infinito.' },
            { src: 'https://i.postimg.cc/769mNr5X/retouch-2026032222550386.png', tag: 'Brillante', msg: 'Tu luz me guía siempre.' },
            { src: 'https://i.postimg.cc/nz201fXv/retouch-2026032222555518.png', tag: 'Para siempre', msg: 'Nuestra historia continúa.' }
        ];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            staticStars = [];
            for (let i = 0; i < 400; i++) {
                staticStars.push({
                    x: (Math.random() - 0.5) * 3000,
                    y: (Math.random() - 0.5) * 3000,
                    z: Math.random() * 2000,
                    sz: Math.random() * 2
                });
            }

            planetObjects = [];
            photoData.forEach((data, i) => {
                const img = new Image();
                img.src = data.src;
                planetObjects.push({
                    x: (Math.random() - 0.5) * 1500,
                    y: (Math.random() - 0.5) * 1000,
                    z: i * (2000 / photoData.length), // Distribuidos en profundidad
                    speed: 4 + Math.random() * 2,
                    img: img, tag: data.tag, msg: data.msg, 
                    size: 120, lastPos: null
                });
            });
        }

        function project(x, y, z) {
            // Rotación de cámara
            let cosX = Math.cos(angleX), sinX = Math.sin(angleX);
            let cosY = Math.cos(angleY), sinY = Math.sin(angleY);

            let ty = y * cosX - z * sinX;
            let tz = y * sinX + z * cosX;
            let tx = x * cosY - tz * sinY;
            tz = x * sinY + tz * cosY;

            const focalLength = 400;
            const scale = focalLength / (focalLength + tz);
            return {
                x: tx * scale + width / 2,
                y: ty * scale + height / 2,
                scale: scale,
                z: tz
            };
        }

        function draw() {
            if(isPaused) return;
            ctx.fillStyle = '#010005';
            ctx.fillRect(0, 0, width, height);

            angleX += (targetAngleX - angleX) * 0.05;
            angleY += (targetAngleY - angleY) * 0.05;

            // Estrellas en movimiento (Efecto túnel)
            ctx.fillStyle = "white";
            staticStars.forEach(s => {
                s.z -= 10; // Velocidad de las estrellas
                if (s.z < -400) s.z = 2000;
                let p = project(s.x, s.y, s.z);
                if (p.scale > 0) {
                    ctx.globalAlpha = Math.min(1, p.scale);
                    ctx.beginPath(); ctx.arc(p.x, p.y, s.sz * p.scale, 0, Math.PI*2); ctx.fill();
                }
            });
            ctx.globalAlpha = 1;

            // Actualizar planetas y ordenar por profundidad
            planetObjects.forEach(p => {
                p.z -= p.speed;
                if (p.z < -400) { // Reiniciar al fondo cuando nos pasan
                    p.z = 2000;
                    p.x = (Math.random() - 0.5) * 1500;
                    p.y = (Math.random() - 0.5) * 1000;
                }
            });

            const rendered = planetObjects
                .map(p => ({ data: p, pos: project(p.x, p.y, p.z) }))
                .filter(r => r.pos.scale > 0)
                .sort((a, b) => b.pos.z - a.pos.z);

            rendered.forEach(r => {
                const p = r.data;
                const pos = r.pos;
                const s = p.size * pos.scale;
                p.lastPos = pos;

                ctx.save();
                ctx.translate(pos.x, pos.y);
                
                if (p.img.complete) {
                    // Brillo y Foto
                    ctx.shadowBlur = 20 * pos.scale;
                    ctx.shadowColor = "rgba(168, 85, 247, 0.5)";
                    ctx.globalAlpha = Math.min(1, pos.scale * 1.5);
                    ctx.drawImage(p.img, -s/2, -s/2, s, s);
                    
                    // Texto
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = "white";
                    ctx.font = `bold ${14 * pos.scale}px sans-serif`;
                    ctx.textAlign = "center";
                    ctx.strokeStyle = "black";
                    ctx.lineWidth = 2 * pos.scale;
                    ctx.strokeText(p.tag, 0, (s/2) + 15 * pos.scale);
                    ctx.fillText(p.tag, 0, (s/2) + 15 * pos.scale);
                }
                ctx.restore();
            });

            requestAnimationFrame(draw);
        }

        // Interacción
        function checkClick(ex, ey) {
            for(let p of planetObjects) {
                if(!p.lastPos) continue;
                const d = Math.hypot(ex - p.lastPos.x, ey - p.lastPos.y);
                if(d < 60 * p.lastPos.scale) {
                    isPaused = true;
                    document.getElementById('pTitle').innerText = p.tag;
                    document.getElementById('pText').innerText = p.msg;
                    document.getElementById('overlay').style.display = 'block';
                    document.getElementById('popup').style.display = 'block';
                    break;
                }
            }
        }

        const start = (x, y) => { isDragging = true; lastX = x; lastY = y; };
        const move = (x, y) => { 
            if(!isDragging || isPaused) return; 
            targetAngleY += (x - lastX) * 0.005; 
            targetAngleX -= (y - lastY) * 0.005; 
            lastX = x; lastY = y; 
        };

        window.addEventListener('mousedown', e => start(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
        window.addEventListener('mouseup', e => { isDragging = false; checkClick(e.clientX, e.clientY); });
        window.addEventListener('touchstart', e => start(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchmove', e => move(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchend', e => { isDragging = false; checkClick(lastX, lastY); });

        document.getElementById('closeBtn').onclick = () => {
            isPaused = false; 
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('popup').style.display = 'none'; 
            draw();
        };

        init(); draw();
        window.onresize = init;
    </script>
</body>
</html>
