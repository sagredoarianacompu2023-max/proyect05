<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia de Recuerdos ✨</title>
    <style>
        body { margin: 0; background-color: #020105; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }

        /* Estilos del Cartel (Pop-up) */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }
        #popup { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 15px; text-align: center; 
            z-index: 1000; max-width: 80%; box-shadow: 0 0 30px rgba(255,255,255,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #popup h2 { margin-top: 0; color: #333; }
        #popup p { color: #666; line-height: 1.5; font-size: 1.1rem; }
        #closeBtn { background: #020105; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 15px; }
        @keyframes popIn { from { opacity: 0; transform: translate(-50%, -60%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>

    <div id="overlay"></div>
    <div id="popup">
        <h2 id="pTitle">Recuerdo Especial</h2>
        <p id="pText">Cargando mensaje...</p>
        <button id="closeBtn">Continuar Explorando</button>
    </div>

    <canvas id="galaxyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, staticStars = [], planetObjects = [];
        let angleX = 0, angleY = 0, targetAngleX = 0, targetAngleY = 0;
        let isDragging = false, isPaused = false, lastX, lastY;

        // --- DATOS DE LAS IMÁGENES Y TEXTOS ---
        const photoData = [
            { src: 'https://i.postimg.cc/QttzBMMn/retouch-2026032222143797.png', tag: 'A tu lado', msg: 'Cada segundo contigo es un regalo del universo.' },
            { src: 'https://i.postimg.cc/4dd0K33j/retouch-2026032222151948.png', tag: 'Esa sonrisa', msg: 'Tu felicidad es mi parte favorita de cada día.' },
            { src: 'https://i.postimg.cc/JnnFyhh2/retouch-2026032222155495.png', tag: 'Momentos', msg: 'Guardar recuerdos contigo es mi pasatiempo favorito.' },
            { src: 'https://i.postimg.cc/633P7QQP/retouch-2026032222162350.png', tag: 'Mágico', msg: 'Lo que tenemos es único y brilla más que cualquier estrella.' },
            { src: 'https://i.postimg.cc/KzzWKYYJ/retouch-2026032222165608.png', tag: 'Cómplices', msg: 'Gracias por ser mi mejor compañía en este viaje.' },
            { src: 'https://i.postimg.cc/8Cw3PvTm/retouch-2026032222222095.png', tag: 'Mi mundo', msg: 'Eres el centro de mi propia galaxia personal.' },
            { src: 'https://i.postimg.cc/26G2xN12/retouch-2026032222415072.png', tag: 'Tú y yo', msg: 'Donde sea, pero siempre juntos.' },
            { src: 'https://i.postimg.cc/Qtm0qZFq/retouch-2026032222425111.png', tag: 'Destino', msg: 'El universo conspiró para que nos encontráramos.' },
            { src: 'https://i.postimg.cc/j5cZhYDX/retouch-2026032222542337.png', tag: 'Te quiero', msg: 'Un mensaje corto para un sentimiento infinito.' },
            { src: 'https://i.postimg.cc/769mNr5X/retouch-2026032222550386.png', tag: 'Brillante', msg: 'Incluso en la oscuridad, tu luz me guía.' },
            { src: 'https://i.postimg.cc/nz201fXv/retouch-2026032222555518.png', tag: 'Para siempre', msg: 'Nuestra historia apenas está comenzando.' }
        ];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // Estrellas estáticas (Fondo)
            staticStars = [];
            for (let i = 0; i < 400; i++) {
                staticStars.push({ x: Math.random()*width, y: Math.random()*height, sz: Math.random()*1.5, op: Math.random() });
            }

            // Planetas / Fotos (3D)
            planetObjects = [];
            photoData.forEach((data, i) => {
                const img = new Image(); img.src = data.src;
                planetObjects.push({
                    dist: 180 + i * 55,
                    angle: (i * (Math.PI * 2 / photoData.length)),
                    speed: 0.005 / (1 + i * 0.1),
                    size: 80,
                    zOff: (Math.random() - 0.5) * 80,
                    img: img, tag: data.tag, msg: data.msg
                });
            });
        }

        // Motor de Proyección 3D
        function rotate3D(x, y, z) {
            let cY = Math.cos(angleY), sY = Math.sin(angleY);
            let x1 = x * cY - z * sY, z1 = x * sY + z * cY;
            let cX = Math.cos(angleX), sX = Math.sin(angleX);
            let y1 = y * cX - z1 * sX, z2 = y * sX + z1 * cX;
            const f = 600; const s = f / (f + z2);
            return { x: x1 * s + width / 2, y: y1 * s + height / 2, s: s, z: z2 };
        }

        // Dibujo de Órbita 3D
        function drawOrbit(dist, zOff) {
            ctx.beginPath(); ctx.strokeStyle = "rgba(100, 255, 255, 0.1)";
            for(let a=0; a<Math.PI*2; a+=0.1) {
                const p = rotate3D(Math.cos(a)*dist, zOff, Math.sin(a)*dist);
                if(a===0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
            }
            ctx.closePath(); ctx.stroke();
        }

            // Foto
            if (p.img.complete) ctx.drawImage(p.img, -s/2, -(s+pad+btm)/2 + pad, s, s);
            
            // Texto bajo foto
            ctx.fillStyle = "#333";
            ctx.font = `bold ${11 * pos.s}px Arial`;
            ctx.textAlign = "center";
            ctx.fillText(p.tag, 0, (s+pad+btm)/2 - btm/2);
            ctx.restore();
        }

        function draw() {
            if(isPaused) return;
            ctx.fillStyle = '#020105'; ctx.fillRect(0, 0, width, height);

            // Fondo Estrellas
            staticStars.forEach(s => {
                ctx.fillStyle = `rgba(255,255,255,${s.op})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.sz, 0, Math.PI*2); ctx.fill();
            });

            angleX += (targetAngleX - angleX) * 0.1;
            angleY += (targetAngleY - angleY) * 0.1;

            // Órbitas
            planetObjects.forEach(p => drawOrbit(p.dist, p.zOff));

            // Sol (Núcleo)
            const n = rotate3D(0, 0, 0);
            const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, 110 * n.s);
            g.addColorStop(0, '#fff'); g.addColorStop(0.2, '#ffeb3b'); g.addColorStop(1, 'transparent');
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(n.x, n.y, 160 * n.s, 0, Math.PI*2); ctx.fill();

            // Preparar Planetas para Z-Sorting
            const rendered = planetObjects.map(p => {
                p.angle += p.speed;
                const pos = rotate3D(Math.cos(p.angle)*p.dist, p.zOff, Math.sin(p.angle)*p.dist);
                p.lastPos = pos; // Guardar para detectar clic
                return { data: p, pos: pos };
            });

            rendered.sort((a,b) => b.pos.z - a.pos.z); // Z-SORTING REAL

            rendered.forEach(r => drawPolaroid(r.data, r.pos));

            requestAnimationFrame(draw);
        }

        // Interacción
        function checkClick(ex, ey) {
            for(let p of planetObjects) {
                if(!p.lastPos) continue;
                const d = Math.hypot(ex - p.lastPos.x, ey - p.lastPos.y);
                if(d < 50 * p.lastPos.s) {
                    isPaused = true;
                    document.getElementById('pTitle').innerText = p.tag;
                    document.getElementById('pText').innerText = p.msg;
                    document.getElementById('overlay').style.display = 'block';
                    document.getElementById('popup').style.display = 'block';
                    return;
                }
            }
        }

        const start = (x, y) => { isDragging = true; lastX = x; lastY = y; };
        const move = (x, y) => {
            if(!isDragging || isPaused) return;
            targetAngleY += (x - lastX) * 0.007; targetAngleX -= (y - lastY) * 0.007;
            lastX = x; lastY = y;
        };
        const end = (x, y) => { if(isDragging && Math.abs(x-lastX) < 2) checkClick(x, y); isDragging = false; };

        window.addEventListener('mousedown', e => start(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
        window.addEventListener('mouseup', e => end(e.clientX, e.clientY));
        window.addEventListener('touchstart', e => start(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchmove', e => move(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchend', e => { isDragging = false; checkClick(lastX, lastY); });

        document.getElementById('closeBtn').onclick = () => {
            isPaused = false; document.getElementById('overlay').style.display = 'none';
            document.getElementById('popup').style.display = 'none'; draw();
        };

        init(); draw();
        window.onresize = init;
    </script>
</body>
</html>
