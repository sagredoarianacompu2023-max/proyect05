<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia✨</title>
    <style>
        body {
            margin: 0;
            background-color: #020005;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .bar {
            position: absolute;
            bottom: 30px;
            width: 85%;
            max-width: 380px;
            display: flex;
            background: rgba(20, 10, 35, 0.6);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 60px;
            padding: 6px 6px 6px 20px;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: #f0abff;
            outline: none;
        }

        button {
            background: #7e22ce;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
        }

        canvas { display: block; filter: blur(4px); } /* El blur suaviza todo el gas */
    </style>
</head>
<body>

    <canvas id="galaxyCanvas"></canvas>

    <div class="bar">
        <input type="text" id="inputField" placeholder="Escribe tu mensaje..." maxlength="12">
        <button id="btn">Expandir</button>
    </div>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, clouds = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            createGalaxy();
        }

        class GasCloud {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = width / 2;
                this.y = height / 2;
                this.size = Math.random() * 100 + 50;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 0.01 + 0.005;
                this.dist = Math.random() * 150;
                // Colores de nebulosa
                const colors = ['rgba(147, 51, 234, 0.15)', 'rgba(59, 130, 246, 0.15)', 'rgba(236, 72, 153, 0.15)'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.angle += this.speed;
                this.currentX = this.x + Math.cos(this.angle) * this.dist;
                this.currentY = this.y + Math.sin(this.angle) * this.dist;
            }

            draw() {
                const gradient = ctx.createRadialGradient(
                    this.currentX, this.currentY, 0,
                    this.currentX, this.currentY, this.size
                );
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.globalCompositeOperation = 'screen'; // Hace que los colores se sumen
                ctx.beginPath();
                ctx.arc(this.currentX, this.currentY, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createGalaxy() {
            clouds = [];
            for (let i = 0; i < 40; i++) {
                clouds.push(new GasCloud());
            }
        }

        function animate() {
            ctx.fillStyle = '#020005';
            ctx.fillRect(0, 0, width, height);

            clouds.forEach(c => {
                c.update();
                c.draw();
            });

            requestAnimationFrame(animate);
        }

        // Al escribir, la galaxia se "estira"
        document.getElementById('btn').onclick = () => {
            const txt = document.getElementById('inputField').value;
            if(txt) {
                clouds.forEach(c => {
                    c.dist += 100; // Expansión visual
                    c.size += 20;
                });
                setTimeout(() => {
                    // Simulación de formación de texto suave
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = "#f0abff";
                    ctx.fillStyle = "white";
                    ctx.font = "bold 60px sans-serif";
                    ctx.textAlign = "center";
                    ctx.fillText(txt.toUpperCase(), width/2, height/2);
                }, 500);
            }
        };

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
